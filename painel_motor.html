<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Painel do Pai — Lucas & Miguel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F0E8;--card:#FFFFFF;--card2:#EDE8DF;
  --b:rgba(0,0,0,0.08);--tp:#1A1A1A;--ts:#5C5C5C;--td:#9E9E9E;
  --lucas:#2C4A6E;--ldim:rgba(44,74,110,0.10);--lb:rgba(44,74,110,0.28);
  --miguel:#2C5E3F;--mdim:rgba(44,94,63,0.10);--mb:rgba(44,94,63,0.28);
  --acc:#2C4A6E;--adim:rgba(44,74,110,0.10);--ab:rgba(44,74,110,0.28);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tp);font-family:'DM Sans',sans-serif;font-weight:400;min-height:100vh;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(245,240,232,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.back{background:none;border:1px solid var(--ab);color:var(--acc);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 10px;border-radius:2px;cursor:pointer;text-decoration:none;text-transform:uppercase;}
.back:hover{background:var(--adim);}
.top-title{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;letter-spacing:.5px;}
.top-sem{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--td);text-transform:uppercase;}

/* TABS */
.tabs{display:flex;align-items:center;border-bottom:1px solid var(--b);padding:0 20px;background:var(--card);position:sticky;top:56px;z-index:40;}
.tab{background:none;border:none;cursor:pointer;padding:14px 22px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--td);border-bottom:2px solid transparent;position:relative;bottom:-1px;transition:all .2s;}
.tab.lucas.on{color:var(--lucas);border-bottom-color:var(--lucas);}
.tab.miguel.on{color:var(--miguel);border-bottom-color:var(--miguel);}
.tab:not(.on):hover{color:var(--ts);}
.views{margin-left:auto;display:flex;gap:6px;padding:8px 0;}
.vbtn{background:var(--bg);border:1px solid var(--b);color:var(--ts);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:2px;cursor:pointer;transition:all .2s;}
.vbtn.on{background:var(--adim);border-color:var(--ab);color:var(--acc);}

/* ── MENTAL ── */
.mental-wrap{padding:0;}
.mental-switcher{display:flex;gap:6px;margin-bottom:16px;}
.mental-sw-btn{flex:1;padding:10px;border:1px solid var(--b);background:var(--card);color:var(--ts);font-family:'DM Serif Display',serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:all .2s;}
.mental-sw-btn.on{background:var(--adim);border-color:var(--ab);color:var(--acc);}
.mental-section-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--td);margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.mental-section-title::after{content:'';flex:1;height:1px;background:var(--b);}
.mental-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
@media(max-width:600px){.mental-cards{grid-template-columns:repeat(3,1fr);}}
.mental-card{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:12px 8px;text-align:center;}
.mental-card-icon{font-size:20px;margin-bottom:4px;}
.mental-card-dim{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);letter-spacing:.5px;margin-bottom:6px;}
.mental-card-val{font-family:'DM Serif Display',serif;font-size:22px;font-weight:700;color:var(--acc);line-height:1;}
.mental-card-delta{font-family:'JetBrains Mono',monospace;font-size:9px;margin-top:3px;}
.mental-card-delta.up{color:#4CAF50;}
.mental-card-delta.dn{color:#f44336;}
.mental-card-delta.eq{color:var(--td);}
.mental-alert{padding:8px 12px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:10px;margin-bottom:10px;border:1px solid rgba(255,152,0,.3);background:rgba(255,152,0,.07);color:#ff9800;}
.mental-hist-bar{display:flex;gap:4px;align-items:flex-end;height:60px;margin-bottom:6px;}
.mental-hb{flex:1;background:var(--adim);border-radius:2px 2px 0 0;min-height:4px;position:relative;cursor:default;}
.mental-hb-pai{background:rgba(59,158,255,0.5);}
.mental-hb-atleta{background:rgba(0,232,122,0.4);}
.mental-hb-lbl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--td);text-align:center;margin-top:3px;}
.mental-q-wrap{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:16px;margin-bottom:12px;}
.mental-q-title{font-family:'DM Serif Display',serif;font-size:14px;font-weight:700;color:var(--tp);margin-bottom:14px;}
.mental-q-item{margin-bottom:14px;}
.mental-q-label{font-size:12px;color:var(--ts);margin-bottom:6px;}
.mental-emoji-row{display:flex;gap:6px;flex-wrap:wrap;}
.mental-emoji-btn{font-size:22px;cursor:pointer;padding:4px 6px;border-radius:4px;border:2px solid transparent;transition:all .15s;background:none;}
.mental-emoji-btn.sel{border-color:var(--acc);background:var(--adim);}
.mental-emoji-btn:hover{transform:scale(1.2);}
.mental-q-nota{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);margin-top:4px;}
.mental-textarea{width:100%;background:var(--card2);border:1px solid var(--b);border-radius:3px;color:var(--tp);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;resize:vertical;min-height:60px;margin-top:4px;}
.mental-textarea:focus{outline:none;border-color:var(--ab);}
.mental-save-btn{width:100%;padding:10px;background:var(--adim);border:1px solid var(--ab);color:var(--acc);font-family:'DM Serif Display',serif;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:3px;margin-top:8px;transition:all .2s;}
.mental-save-btn:hover{background:rgba(59,158,255,0.2);}
.mental-hist-list{display:flex;flex-direction:column;gap:6px;}
.mental-hist-item{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:10px 12px;}
.mental-hist-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.mental-hist-sem{font-family:'DM Serif Display',serif;font-size:13px;font-weight:700;color:var(--acc);}
.mental-hist-fonte{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);padding:2px 5px;border:1px solid var(--b);border-radius:2px;}
.mental-hist-score{font-family:'DM Serif Display',serif;font-size:18px;font-weight:700;margin-left:auto;}
.mental-hist-del{background:none;border:none;color:var(--td);cursor:pointer;font-size:11px;padding:2px 5px;}
.mental-hist-del:hover{color:#f44336;}
.mental-diario-item{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:10px 12px;margin-bottom:6px;}
.mental-diario-date{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);margin-bottom:4px;}
.mental-diario-txt{font-size:12px;color:var(--ts);}
.mental-ex-card{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:12px 14px;margin-bottom:8px;}
.mental-ex-id{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--acc);margin-bottom:4px;letter-spacing:1px;}
.mental-ex-nome{font-family:'DM Serif Display',serif;font-size:14px;font-weight:700;color:var(--tp);margin-bottom:4px;}
.mental-ex-desc{font-size:11px;color:var(--ts);line-height:1.5;}
.mental-badge-sessao{display:inline-block;padding:2px 7px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:8px;margin-right:6px;margin-bottom:6px;}
.mental-badge-s1{background:rgba(44,74,110,0.10);border:1px solid rgba(44,74,110,0.28);color:#2C4A6E;}
.mental-badge-s3{background:rgba(206,147,216,0.1);border:1px solid rgba(206,147,216,0.3);color:#ce93d8;}
.mental-sem-sel{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.mental-sem-sel label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);letter-spacing:1px;}
.mental-sem-sel select{background:var(--card2);border:1px solid var(--b);color:var(--tp);font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 8px;border-radius:3px;cursor:pointer;}


/* SEMANA HEADER */
.sem-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 16px;background:var(--card);border:1px solid var(--b);border-radius:4px;}
.sem-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);letter-spacing:1px;text-transform:uppercase;}
.sem-val{font-family:'DM Serif Display',serif;font-size:16px;font-weight:700;color:var(--acc);}
.sem-cnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ts);margin-left:auto;}

/* LEGENDA */
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;padding:8px 14px;background:var(--card);border:1px solid var(--b);border-radius:4px;font-size:11px;color:var(--ts);}
.leg span{display:flex;align-items:center;gap:4px;}
.dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* DIA */
.dia{margin-bottom:20px;}
.dia-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--td);margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--b);}

/* EXERCÍCIO ROW */
.exrow{background:var(--card);border:1px solid var(--b);border-radius:4px;margin-bottom:5px;display:flex;align-items:center;overflow:hidden;}
.exnum{width:40px;min-width:40px;height:50px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;font-weight:700;color:var(--td);border-right:1px solid var(--b);flex-shrink:0;}
.exinfo{flex:1;padding:7px 12px;min-width:0;}
.exnome{font-family:'DM Serif Display',serif;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exsub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);margin-top:2px;}
.chips{display:flex;gap:4px;padding:0 10px;flex-shrink:0;}

/* CHIP */
.chip{display:flex;flex-direction:column;align-items:center;justify-content:center;width:36px;height:36px;border-radius:3px;border:1px solid var(--b);background:var(--card2);transition:all .15s;}
.chip.clk{cursor:pointer;}
.chip.clk:hover{transform:scale(1.1);}
.cs{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--td);}
.cn{font-family:'DM Serif Display',serif;font-size:12px;font-weight:700;color:var(--td);}
.chip.v{border-color:var(--ab);background:var(--adim);}
.chip.v .cs{color:var(--acc);}
.chip.v .cn{color:var(--tp);}
.chip.ev{border-color:rgba(76,175,80,.5);background:rgba(76,175,80,.08);}
.chip.ev .cn{color:#4CAF50;}
.chip.re{border-color:rgba(255,152,0,.5);background:rgba(255,152,0,.08);}
.chip.re .cn{color:#ff9800;}
.chip.sb{border-color:rgba(206,147,216,.5);background:rgba(206,147,216,.08);}
.chip.sb .cn{color:#ce93d8;}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.ov.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--ab);border-radius:8px;width:100%;max-width:520px;margin:auto;}
.mhd{padding:14px 18px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.mtitle{font-family:'DM Serif Display',serif;font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--acc);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mclose{background:none;border:1px solid var(--b);color:var(--ts);width:26px;height:26px;border-radius:2px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mbody{padding:18px;}
.yt-wrap{position:relative;padding-bottom:56.25%;margin-bottom:12px;background:#000;border-radius:4px;overflow:hidden;}
.yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
.novid{padding:12px;text-align:center;color:var(--td);font-size:11px;border:1px dashed var(--b);border-radius:4px;margin-bottom:12px;font-family:'JetBrains Mono',monospace;}
.mmeta{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px;}
.mmi{background:var(--card2);border:1px solid var(--b);border-radius:3px;padding:6px 10px;}
.mml{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--td);text-transform:uppercase;margin-bottom:2px;}
.mmv{font-size:12px;color:var(--tp);}
.avt{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--td);margin-bottom:7px;}
.ngrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.ni{background:var(--card2);border:1px solid var(--b);border-radius:4px;padding:9px 6px;text-align:center;}
.nd{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);text-transform:uppercase;margin-bottom:5px;}
.nstars{display:flex;justify-content:center;gap:2px;}
.star{font-size:15px;cursor:pointer;opacity:.2;transition:all .1s;color:#ff9800;line-height:1;}
.star.on{opacity:1;}
.nval{font-family:'DM Serif Display',serif;font-size:15px;font-weight:700;color:var(--tp);margin-top:3px;}
.abtns{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.abtn{flex:1;min-width:68px;padding:8px 4px;border-radius:3px;border:1px solid;font-family:'DM Serif Display',serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;background:transparent;}
.abtn.ev{color:#4CAF50;border-color:rgba(76,175,80,.3);}
.abtn.ev:hover,.abtn.ev.on{background:rgba(76,175,80,.15);border-color:#4CAF50;}
.abtn.re{color:#ff9800;border-color:rgba(255,152,0,.3);}
.abtn.re:hover,.abtn.re.on{background:rgba(255,152,0,.15);border-color:#ff9800;}
.abtn.sb{color:#ce93d8;border-color:rgba(206,147,216,.3);}
.abtn.sb:hover,.abtn.sb.on{background:rgba(206,147,216,.15);border-color:#ce93d8;}
.ntxt{width:100%;background:var(--card2);border:1px solid var(--b);border-radius:3px;padding:8px 10px;color:var(--tp);font-family:'DM Sans',sans-serif;font-size:12px;resize:vertical;min-height:60px;margin-bottom:10px;font-weight:300;}
.ntxt:focus{outline:none;border-color:var(--ab);}
.ntxt::placeholder{color:var(--td);}
.sbtn{width:100%;background:var(--acc);color:#FFFFFF;font-family:'DM Serif Display',serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:11px;border:none;border-radius:3px;cursor:pointer;}
.sbtn:hover{opacity:.88;}

/* DASHBOARD */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:580px){.dgrid{grid-template-columns:1fr;}}
.dc{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:14px;}
.dct{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--td);margin-bottom:12px;}
.mbar{margin-bottom:8px;}
.mbh{display:flex;justify-content:space-between;margin-bottom:3px;}
.mbn{font-size:12px;color:var(--ts);}
.mbv{font-family:'DM Serif Display',serif;font-size:13px;font-weight:700;color:var(--acc);}
.mbbg{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.mbf{height:100%;border-radius:3px;background:var(--acc);transition:width .6s;}
.crow{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.csem{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);width:34px;flex-shrink:0;}
.cbg{flex:1;height:18px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;}
.cb{height:100%;border-radius:2px;background:var(--acc);display:flex;align-items:center;padding-left:6px;}
.cbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(245,240,232,0.9);}
.cv{font-family:'DM Serif Display',serif;font-size:12px;font-weight:700;color:var(--acc);width:26px;text-align:right;flex-shrink:0;}
.ri{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--card2);border:1px solid var(--b);border-radius:3px;margin-bottom:4px;}
.rp{font-family:'DM Serif Display',serif;font-size:15px;font-weight:700;color:var(--td);width:16px;}
.rn{flex:1;font-size:12px;color:var(--ts);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rv{font-family:'DM Serif Display',serif;font-size:13px;font-weight:700;}
.ri.t1 .rp{color:var(--acc);}
.ri.t1 .rn{color:var(--tp);}
.srow{display:flex;gap:20px;flex-wrap:wrap;}
.si{text-align:center;}
.sn{font-family:'DM Serif Display',serif;font-size:30px;font-weight:700;}
.sl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

.empty{text-align:center;padding:44px 20px;}
.eico{font-size:32px;margin-bottom:12px;opacity:.3;}
.etitle{font-family:'DM Serif Display',serif;font-size:18px;font-weight:700;color:var(--td);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
.esub{font-size:12px;color:var(--td);line-height:1.6;}

/* ERRO */
.erro{margin:20px;padding:14px;background:rgba(244,67,54,.08);border:1px solid rgba(244,67,54,.3);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#f44336;line-height:1.5;}

/* ── BIOMETRIA WIDGET ── */
.bio-widget{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:14px 16px;margin-bottom:14px;}
.bio-widget-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.bio-widget-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--td);}
.bio-link{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--acc);text-decoration:none;padding:3px 8px;border:1px solid var(--ab);border-radius:2px;transition:all .2s;}
.bio-link:hover{background:var(--adim);}
.bio-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:480px){.bio-tiles{grid-template-columns:repeat(2,1fr);}}
.bio-tile{background:var(--card2);border:1px solid var(--b);border-radius:3px;padding:10px 8px;text-align:center;}
.bio-tile-val{font-family:'DM Serif Display',serif;font-size:22px;font-weight:700;color:var(--tp);line-height:1;}
.bio-tile-unit{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);margin-left:1px;}
.bio-tile-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--ts);margin-top:4px;}
.bio-tile-delta{font-family:'JetBrains Mono',monospace;font-size:8px;color:#4CAF50;margin-top:2px;}
.bio-phv{margin-top:10px;padding:8px 12px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.5px;display:flex;align-items:center;gap:8px;}
.bio-phv-pre{background:rgba(44,94,63,0.08);border:1px solid rgba(44,94,63,0.25);color:#2C5E3F;}
.bio-phv-circa{background:rgba(255,152,0,0.08);border:1px solid rgba(255,152,0,0.3);color:#ff9800;}
.bio-phv-post{background:rgba(244,67,54,0.07);border:1px solid rgba(244,67,54,0.25);color:#f44336;}
.bio-phv-none{background:rgba(0,0,0,0.05);border:1px solid var(--b);color:var(--td);}
.bio-phv-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.bio-no-data{text-align:center;padding:16px;color:var(--td);font-family:'JetBrains Mono',monospace;font-size:10px;}
.saude-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 14px;border:1px solid rgba(206,147,216,0.3);border-radius:3px;background:rgba(206,147,216,0.06);color:#ce93d8;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:all .2s;width:100%;justify-content:center;}

/* ── MOTOR DE DIAGNÓSTICO ── */
.motor-wrap{padding:0;}

.motor-run-btn{width:100%;padding:14px;background:var(--acc);color:#FFFFFF;font-family:'DM Serif Display',serif;font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}

.motor-result{background:var(--card);border:1px solid var(--b);border-radius:4px;overflow:hidden;margin-bottom:12px;}

.motor-ex-n{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);width:16px;flex-shrink:0;}

@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.motor-loading-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--td);letter-spacing:1px;}
.motor-error{padding:16px;background:rgba(244,67,54,.07);border:1px solid rgba(244,67,54,.25);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#f44336;line-height:1.6;}
.motor-api-row{display:flex;gap:8px;align-items:flex-end;}

.motor-api-toggle{padding:8px 12px;background:var(--card2);border:1px solid var(--b);border-radius:3px;color:var(--td);font-family:'JetBrains Mono',monospace;font-size:9px;cursor:pointer;white-space:nowrap;transition:all .2s;}

/* ══════════════════════════════════════════════════

.veo-wrap{padding:4px 0 40px;}
.veo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}

.veo-field{display:flex;flex-direction:column;gap:4px;}
.veo-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--td);}
.veo-input{background:var(--bg);border:1px solid var(--b);border-radius:3px;color:var(--tp);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 10px;outline:none;transition:border .2s;width:100%;}
.veo-input:focus{border-color:var(--acc);}
.veo-select{background:var(--bg);border:1px solid var(--b);border-radius:3px;color:var(--tp);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 10px;outline:none;width:100%;}
.veo-textarea{background:var(--bg);border:1px solid var(--b);border-radius:3px;color:var(--tp);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;outline:none;resize:vertical;width:100%;min-height:64px;}
.veo-textarea:focus{border-color:var(--acc);}
.veo-section{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--td);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--b);}
.veo-hint{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);margin-top:3px;font-style:italic;}
.veo-pending{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(255,152,0,0.06);border:1px solid rgba(255,152,0,0.2);border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#ff9800;margin-bottom:10px;}
.veo-btn-salvar{width:100%;padding:12px;background:var(--adim);border:1px solid var(--ab);border-radius:3px;color:var(--acc);font-family:'DM Serif Display',serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:6px;}
.veo-btn-salvar:hover{background:var(--acc);color:#000;}

/* PLAYER SPOTLIGHT */

.veo-player-card{background:var(--card);border-radius:6px;padding:14px;position:relative;overflow:hidden;}
.veo-player-card.lucas-card{border:1px solid var(--lb);}
.veo-player-card.miguel-card{border:1px solid var(--mb);}
.veo-player-num{position:absolute;top:10px;right:14px;font-family:'DM Serif Display',serif;font-size:36px;font-weight:700;opacity:.08;}
.veo-player-name{font-family:'DM Serif Display',serif;font-size:15px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
.veo-player-pos{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);letter-spacing:1px;margin-bottom:10px;}

.veo-cross{background:var(--card);border:1px solid var(--b);border-radius:6px;padding:14px;margin-bottom:16px;}

.veo-cross-dot.aguarda{background:#ff9800;}
.veo-cross-dot.ok{background:#4CAF50;}
.veo-cross-info{flex:1;}
.veo-cross-gap{font-family:'DM Serif Display',serif;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--tp);}
.veo-cross-desc{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);margin-top:2px;}
.veo-cross-connector{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 7px;border-radius:2px;border:1px dashed;white-space:nowrap;}
.veo-cross-connector.aguarda{color:#ff9800;border-color:rgba(255,152,0,0.3);}
.veo-cross-connector.pronto{color:#4CAF50;border-color:rgba(76,175,80,0.3);}

/* HISTÓRICO */
.veo-hist-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--td);margin-bottom:10px;}

.veo-jogo-obs{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ts);line-height:1.5;padding:8px 10px;background:var(--card2);border-radius:3px;border:1px solid var(--b);}
.veo-jogo-del{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);cursor:pointer;padding:4px 8px;border:1px solid var(--b);border-radius:2px;float:right;margin-bottom:8px;}
.veo-jogo-del:hover{color:#ff4444;border-color:#ff4444;}
.veo-empty-jogos{text-align:center;padding:40px 20px;color:var(--td);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;}

/* EVOLUÇÃO COMPARATIVA */
.veo-evo{background:var(--card);border:1px solid var(--b);border-radius:6px;padding:14px;margin-bottom:16px;}

/* ══════════════════════════════════════════════════
   FASE 5 — PERFORMANCE CLOCK & DOSSIÊ ELITE
   ══════════════════════════════════════════════════ */

/* CLOCK WRAP */
.clock-wrap{padding:0;}
.clock-section{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--td);margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.clock-section::after{content:'';flex:1;height:1px;background:var(--b);}

/* STATS HEADER */
.clock-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
@media(max-width:500px){.clock-stats{grid-template-columns:repeat(2,1fr);}}
.clock-stat{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:12px 10px;text-align:center;}
.clock-stat-val{font-family:'DM Serif Display',serif;font-size:26px;font-weight:700;color:var(--acc);line-height:1;}
.clock-stat-lbl{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--td);margin-top:4px;}

/* TIMELINE */
.clock-timeline{position:relative;padding-left:24px;margin-bottom:20px;}
.clock-timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--b);}
.clock-entry{position:relative;margin-bottom:12px;}
.clock-entry::before{content:'';position:absolute;left:-21px;top:7px;width:8px;height:8px;border-radius:50%;background:var(--acc);border:1px solid var(--bg);flex-shrink:0;}
.clock-entry.auto::before{background:var(--acc);}
.clock-entry.manual::before{background:#ce93d8;}
.clock-entry.milestone::before{background:#ff9800;width:10px;height:10px;left:-22px;box-shadow:0 0 8px rgba(255,152,0,0.5);}
.clock-card{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:10px 12px;transition:border-color .2s;}
.clock-card:hover{border-color:var(--ab);}
.clock-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;}
.clock-card-title{font-family:'DM Serif Display',serif;font-size:13px;font-weight:700;color:var(--tp);letter-spacing:.5px;}
.clock-card-date{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);flex-shrink:0;margin-top:2px;}
.clock-card-desc{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--ts);line-height:1.5;margin-bottom:6px;}
.clock-card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.clock-tag{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:2px;}
.clock-tag.gap{background:var(--adim);color:var(--acc);border:1px solid var(--ab);}

.clock-tag.manual{background:rgba(206,147,216,0.08);color:#ce93d8;border:1px solid rgba(206,147,216,0.25);}
.clock-tag.milestone{background:rgba(255,152,0,0.1);color:#ff9800;border:1px solid rgba(255,152,0,0.3);}
.clock-tag.sessao{background:rgba(59,158,255,0.08);color:var(--lucas);border:1px solid rgba(59,158,255,0.25);}
.clock-del{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);cursor:pointer;padding:2px 6px;border:1px solid var(--b);border-radius:2px;margin-left:4px;flex-shrink:0;}
.clock-del:hover{color:#f44336;border-color:#f44336;}

.clock-empty{text-align:center;padding:36px 20px;color:var(--td);font-family:'JetBrains Mono',monospace;font-size:9px;line-height:1.8;letter-spacing:.5px;}

/* FORM ADICIONAR MARCO */
.clock-add-card{background:var(--card);border:1px solid var(--b);border-radius:4px;padding:14px;margin-bottom:16px;}
.clock-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
@media(max-width:500px){.clock-form-grid{grid-template-columns:1fr;}}
.clock-field{display:flex;flex-direction:column;gap:4px;}
.clock-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--td);}
.clock-input,.clock-select,.clock-textarea{background:var(--card2);border:1px solid var(--b);border-radius:3px;padding:8px 10px;color:var(--tp);font-family:'JetBrains Mono',monospace;font-size:11px;width:100%;transition:border-color .2s;}
.clock-input:focus,.clock-select:focus,.clock-textarea:focus{outline:none;border-color:var(--ab);}

function semAtual(){
  const ini=new Date('2026-03-01');
  const n=Math.max(1,Math.floor((new Date()-ini)/(7*24*60*60*1000))+1);
  const m=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const d=new Date();
  return `S${n} ${m[d.getMonth()]}/${d.getFullYear().toString().slice(2)}`;
}

async function carregar(){
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout — servidor nao respondeu em 10s')),10000));
    const req=fetch(SB_URL+'/rest/v1/avaliacoes?select=*',{
      headers:{
        'apikey':SB_KEY,
        'Accept':'application/json',
        'Content-Type':'application/json'
      }
    });
    const r=await Promise.race([req,timeout]);
    if(!r.ok){
      const txt=await r.text();
      throw new Error('HTTP '+r.status+': '+txt.slice(0,200));
    }
    const rows=await r.json();
    if(!Array.isArray(rows)) throw new Error('Resposta inválida: '+JSON.stringify(rows).slice(0,200));
    dados=rows.map(r=>{
      let res={},fb={};
      try{res=JSON.parse(r.resultado||'{}');}catch(e){}
      try{fb=JSON.parse(r.feedback||'{}');}catch(e){}
      return {
        _id:r.id, exId:r.exercicio, atleta:r.jogador,
        semana:res.semana||'—', data:res.data||r.avaliado_em||'',
        nome:res.nome_exercicio||NM[r.exercicio]||r.exercicio,
        ytId:res.youtube_id||null,
        av:fb.av||null, notaPai:fb.nota_pai||'',
        ia:{p:fb.ia_postura||null,s:fb.ia_scanning||null,ps:fb.ia_psicologico||null},
        resumoCrianca:fb.resumo_crianca||null,
        analisePai:fb.analise_pai||null,
        pontoForte:fb.ponto_forte||null,
        pontoMelhora:fb.ponto_melhora||null
      };
    }).sort((a,b)=>new Date(a.data)-new Date(b.data));
    return null;
  }catch(err){
    return err.message;
  }
}

const BIO_KEY='biometria_v2';
function bioData(){try{const s=localStorage.getItem(BIO_KEY);return s?JSON.parse(s):null;}catch(e){return null;}}
function bioAthlete(name){const s=bioData();if(!s)return null;return s.athletes?.find(a=>a.name.toLowerCase()===name.toLowerCase())||null;}

// ── INTEGRAÇÃO SONO → MOTOR (Fase 1 — pendência resolvida)
// Lê os registros de sono do saude.html/biometria via localStorage (biometria_v2)
// Retorna: { media, dias, total, status, label } ou null se não houver dados
function lerSonoDoSaude(atletaNome) {
  const a = bioAthlete(atletaNome);
  if (!a || !a.sono || !a.sono.length) return null;

  const hoje = new Date();
  hoje.setHours(23,59,59,999);
  const seteAtras = new Date(hoje);
  seteAtras.setDate(seteAtras.getDate() - 6);
  seteAtras.setHours(0,0,0,0);

  // Filtra últimos 7 dias
  const recentes = a.sono
    .filter(s => { const d = new Date(s.date); return d >= seteAtras && d <= hoje; })
    .sort((a,b) => new Date(b.date) - new Date(a.date));

  if (!recentes.length) {
    // Sem dados recentes — pega últimas 3 medições disponíveis como fallback
    const ultimas = [...a.sono].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,3);
    if (!ultimas.length) return null;
    const media = ultimas.reduce((s,x) => s + x.hours, 0) / ultimas.length;
    return {
      media: parseFloat(media.toFixed(1)),
      dias: ultimas.length,
      total: 7,
      status: media >= 9 ? 'ok' : media >= 7 ? 'warn' : 'baixo',
      label: `${parseFloat(media.toFixed(1))}h · baseado nas últimas ${ultimas.length} medições`,
      fonte: 'historico'
    };
  }

  const media = recentes.reduce((s,x) => s + x.hours, 0) / recentes.length;
  const status = media >= 9 ? 'ok' : media >= 7 ? 'warn' : 'baixo';
  const statusLabels = { ok:'✓ adequado', warn:'⚠ atenção', baixo:'⚠ insuficiente' };
  return {
    media: parseFloat(media.toFixed(1)),
    dias: recentes.length,
    total: 7,
    status,
    label: `${parseFloat(media.toFixed(1))}h · média ${recentes.length}/7 dias · ${statusLabels[status]}`,
    fonte: 'saude'
  };
}
function calcPHVOffset(h,w,dob){
  if(!h||!w||!dob)return null;
  const age=(new Date()-new Date(dob))/(365.25*24*3600*1000);
  if(age<8)return null;
  return parseFloat((-9.236+(0.0002708*(h*w))+(-0.001663*(age*h))+(0.007216*(age*w))+(0.02292*(w/h*100))).toFixed(2));
}

    else phvHtml=`<div class="bio-phv bio-phv-post"><span class="bio-phv-dot"></span>Pós-PHV &nbsp;${sign}${off}a &nbsp;— janela para força e potência</div>`;
  } else {

  }

// ── DASHBOARD
function rDash(){
  const ids=IL[player].flatMap(g=>g.ids);
  const todas=ids.flatMap(id=>hist(id).map(e=>({...e,id})));
  if(!todas.length){
    document.getElementById('wrap').innerHTML=`<div class="empty">
      <div class="eico">📊</div>
      <div class="etitle">Dashboard vazio</div>
      <div class="esub">Avalie vídeos na aba Treinos para ver gráficos aqui.</div>
    </div>`;
    return;
  }
  const dims=[{k:'p',l:'Postura'},{k:'s',l:'Scanning'},{k:'ps',l:'Psicológico'}];
  const md={};
  dims.forEach(({k})=>{
    const v=todas.filter(e=>e.ia[k]!==null).map(e=>e.ia[k]);
    md[k]=v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
  });
  const ps={};
  todas.forEach(e=>{const m=media(e.ia);if(m===null)return;if(!ps[e.semana])ps[e.semana]=[];ps[e.semana].push(m);});
  const sems=Object.keys(ps).sort((a,b)=>parseInt(a)-parseInt(b));
  const pe={};
  todas.forEach(e=>{const m=media(e.ia);if(m===null)return;if(!pe[e.id])pe[e.id]={nm:e.nome,vs:[]};pe[e.id].vs.push(m);});
  const rank=Object.values(pe).map(x=>({nm:x.nm,m:x.vs.reduce((a,b)=>a+b,0)/x.vs.length})).sort((a,b)=>b.m-a.m);
  let ev=0,re=0,sb=0;
  todas.forEach(e=>{if(e.av==='evoluiu')ev++;else if(e.av==='repetir')re++;else if(e.av==='sobe')sb++;});

  const bars=dims.map(({k,l})=>{
    const v=md[k];const p=v!==null?(v/5*100):0;
    return `<div class="mbar"><div class="mbh"><span class="mbn">${l}</span><span class="mbv">${v!==null?v.toFixed(1)+'/5':'—'}</span></div><div class="mbbg"><div class="mbf" style="width:${p}%"></div></div></div>`;
  }).join('');

  const cbars=sems.map(s=>{
    const v=ps[s];const m=v.reduce((a,b)=>a+b,0)/v.length;const p=Math.round(m/5*100);
    return `<div class="crow"><span class="csem">${s.split(' ')[0]}</span><div class="cbg"><div class="cb" style="width:${p}%"><span class="cbl">${m.toFixed(1)}</span></div></div><span class="cv">${m.toFixed(1)}</span></div>`;
  }).join('')||'<div style="color:var(--td);font-size:12px;">Avalie vídeos para ver evolução</div>';

  const rrow=(x,i,t)=>`<div class="ri ${t&&i===0?'t1':''}"><span class="rp">${t?i+1:'⚠'}</span><span class="rn">${x.nm}</span><span class="rv" style="color:${t?'var(--acc)':'#ff9800'}">${x.m.toFixed(1)}</span></div>`;
  const top=rank.slice(0,3).map((x,i)=>rrow(x,i,true)).join('');
  const bot=rank.length>1?rank.slice(-Math.min(3,rank.length-1)).reverse().map((x,i)=>rrow(x,i,false)).join(''):'';

  document.getElementById('wrap').innerHTML=`
    <div style="margin-top:4px;">
      ${bioWidget(player)}
      <div class="dgrid">
        <div class="dc"><div class="dct">// média por dimensão</div>${bars}</div>
        <div class="dc"><div class="dct">// evolução semanal</div>${cbars}</div>
      </div>
      <div class="dgrid">
        <div class="dc"><div class="dct">// melhores exercícios</div>${top||'<div style="color:var(--td);font-size:12px;">Avalie vídeos para ver ranking</div>'}</div>
        <div class="dc"><div class="dct">// atenção</div>${bot||'<div style="color:var(--td);font-size:12px;">Avalie mais para ver</div>'}</div>
      </div>
      <div class="dc" style="margin-bottom:20px;">
        <div class="dct">// decisões do pai</div>
        <div class="srow">
          <div class="si"><div class="sn" style="color:#4CAF50;">${ev}</div><div class="sl">Evoluiu</div></div>
          <div class="si"><div class="sn" style="color:#ff9800;">${re}</div><div class="sl">Repetir</div></div>
          <div class="si"><div class="sn" style="color:#ce93d8;">${sb}</div><div class="sl">Sobe nível</div></div>
          <div class="si"><div class="sn" style="color:var(--acc);">${todas.length}</div><div class="sl">Total</div></div>
        </div>
      </div>
    </div>`;
}

function sn(k,v){
  if(!mctx) return;
  const e=dados.find(d=>d._id===mctx._id);
  if(e) e.ia[k]=v;
  document.querySelectorAll(`#st-${k} .star`).forEach(s=>s.classList.toggle('on',parseInt(s.dataset.n)<=v));
  document.getElementById('nv-'+k).textContent=v+'/5';
}
function sa(av){
  if(!mctx) return;
  const e=dados.find(d=>d._id===mctx._id);
  if(e) e.av=av;
  document.querySelectorAll('.abtn').forEach(b=>b.classList.remove('on'));
  document.querySelector('.abtn.'+av.slice(0,2))?.classList.add('on');
}
async function salvar(){
  if(!mctx) return;
  const e=dados.find(d=>d._id===mctx._id);
  if(!e) return;
  e.notaPai=document.getElementById('ntxt')?.value||'';
  // Preserva campos da IA ao salvar avaliação do pai
  const fb=JSON.stringify({
    av:e.av, nota_pai:e.notaPai,
    ia_postura:e.ia.p, ia_scanning:e.ia.s, ia_psicologico:e.ia.ps,
    resumo_crianca:e.resumoCrianca||null,
    analise_pai:e.analisePai||null,
    ponto_forte:e.pontoForte||null,
    ponto_melhora:e.pontoMelhora||null
  });
  await fetch(SB_URL+'/rest/v1/avaliacoes?id=eq.'+mctx._id,{
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({feedback:fb,avaliado_em:new Date().toISOString()})
  });
  fm();
  renderView();
}
function fm(){document.getElementById('ov').classList.remove('show');mctx=null;}
function fmse(ev){if(ev.target===document.getElementById('ov'))fm();}

// ── HELPERS
function media(ia){
  if(!ia) return null;
  const v=[ia.p,ia.s,ia.ps].filter(x=>x!==null);
  return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
}
function fdt(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'});
}
function diaDe(id){
  const g=IL[player].find(g=>g.ids.includes(id));
  return g?g.s:'—';
}

function lerExamesClinicosF7(atletaNome) {
  try {
    const raw = localStorage.getItem('biometria_v2');
    if (!raw) return null;
    const store = JSON.parse(raw);
    const a = store.athletes?.find(x => x.name.toLowerCase() === atletaNome.toLowerCase());
    if (!a || !a.exames || !a.exames.length) return null;
    const sorted = [...a.exames].sort((x,y) => new Date(y.date) - new Date(x.date));
    const newest = sorted[0];
    if (newest.name !== undefined && newest.value !== undefined) {
      const flat = { date: newest.date };
      const seen = {};
      for (const ex of sorted) {
        const key = EXAM_NAME_MAP_F7[ex.name] || EXAM_NAME_MAP_F7[ex.name?.toLowerCase()];
        if (key && !seen[key]) { flat[key] = ex.value; seen[key] = true; }
        if (!flat.date || new Date(ex.date) > new Date(flat.date)) flat.date = ex.date;
      }
      return flat;
    }
    return newest;
  } catch(e) { return null; }
}
function lerPHVAutomaticoF7(atletaNome) {
  try {
    const raw = localStorage.getItem('biometria_v2');
    if (!raw) return null;
    const store = JSON.parse(raw);
    const a = store.athletes?.find(x => x.name.toLowerCase() === atletaNome.toLowerCase());
    if (!a || !a.records || !a.records.length) return null;
    const ultimo = [...a.records].sort((x,y) => new Date(y.date) - new Date(x.date))[0];
    if (!ultimo || !ultimo.height || !ultimo.weight || !a.dob) return null;
    const age = (new Date() - new Date(a.dob)) / (365.25*24*3600*1000);
    const offset = parseFloat((-9.236+(0.0002708*(ultimo.height*ultimo.weight))+(-0.001663*(age*ultimo.height))+(0.007216*(age*ultimo.weight))+(0.02292*(ultimo.weight/ultimo.height*100))).toFixed(2));
    const fase = offset < -1 ? 'pre' : offset <= 1 ? 'circa' : 'pos';
    return { offset, fase, altura: ultimo.height, peso: ultimo.weight, data: ultimo.date };
  } catch(e) { return null; }
}

      <div class="motor-loading-state">
        <div class="motor-loading-icon">⚡</div>
        <div class="motor-loading-text">motor analisando ${p.nome}...<br><br>cruzando gaps · carga · mental · PHV</div>
      </div>
    </div>`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{role:'user',content:prompt}]
      })
    });
    if (!resp.ok) { const t=await resp.text(); throw new Error(`API ${resp.status}: ${t.slice(0,200)}`); }
    const data = await resp.json();
    const raw = data.content?.find(b=>b.type==='text')?.text || '';
    let resultado;
    try {
      resultado = JSON.parse(raw.replace(/```json|```/g,'').trim());
    } catch(e) {
      throw new Error('Resposta da IA não é JSON válido: ' + raw.slice(0,300));
    }
    resultado.atleta = player;
    resultado.geradoEm = new Date().toISOString();
    resultado.semana = semanas;
    // ── FASE 7: Mesclar alertas locais (sono, exames, PHV) com os da IA ──
    if (alertasF7.length > 0) {
      resultado.alertas = [...alertasF7, ...(resultado.alertas || [])];
    }
    motorState.ultimoResultado = resultado;
    const hist = JSON.parse(localStorage.getItem('motor_historico')||'[]');
    hist.unshift(resultado);
    localStorage.setItem('motor_historico', JSON.stringify(hist.slice(0,12)));
    clockDetectarMarcos(player, resultado);
    document.getElementById('motorResultado').innerHTML = renderResultado(resultado);
  } catch(err) {
    document.getElementById('motorResultado').innerHTML =
      `<div class="motor-error">❌ Erro ao gerar diagnóstico:<br><br>${err.message}<br><br>
      <small>Verifique se a API key está correta e se você tem créditos disponíveis.</small></div>`;
  } finally {
    motorState.rodando = false;
    const btn2 = document.getElementById('motorBtn');
    if(btn2){btn2.disabled=false;btn2.classList.remove('loading');btn2.textContent='⚡ Gerar Diagnóstico da Semana';}
  }
}

function renderResultado(r) {
  if (!r) return '';
  const cor = r.atleta === 'lucas' ? 'var(--lucas)' : 'var(--miguel)';
  const now = r.geradoEm ? new Date(r.geradoEm).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
  const cargaCor = r.carga_semana==='reduzida'?'#ff9800':r.carga_semana==='aumentada'?'#4CAF50':'var(--td)';
  const cargaLabel = r.carga_semana==='reduzida'?'↓ Carga Reduzida':r.carga_semana==='aumentada'?'↑ Carga Aumentada':'→ Carga Normal';
  const gapStatus = PERFIL_ATLETA[r.atleta]?.gaps?.[r.gap_prioritario]?.status || 'planejado';

  // ── Alerta I: score mental < 5 por 2 semanas consecutivas
  let alertaMentalHTML = '';
  try {
    const semanal = JSON.parse(localStorage.getItem('mental_semanal') || '[]');
    const semAtleta = semanal.filter(e => e.atleta === r.atleta && e.score != null);
    const ult2 = semAtleta.slice(-2);
    if (ult2.length === 2 && ult2[0].score < 5 && ult2[1].score < 5) {
      const nomeAtleta = r.atleta === 'lucas' ? 'Lucas' : 'Miguel';
      alertaMentalHTML = `
        <div class="motor-alerta warn" style="border-color:rgba(244,67,54,.35);background:rgba(244,67,54,.06);color:#f44336;margin:10px 16px 0;border-radius:3px;">
          <span>🔴</span>
          <span><strong>Atenção:</strong> Score mental de ${nomeAtleta} abaixo de 5 por 2 semanas consecutivas
          (${ult2[0].score.toFixed(1)} → ${ult2[1].score.toFixed(1)}).
          Considere uma conversa aberta com ${nomeAtleta} antes do próximo treino.</span>
        </div>`;
    }
  } catch(e) {}

  const alertasHTML = (r.alertas||[]).map(a=>
    `<div class="motor-alerta ${a.tipo}">
      <span>${a.tipo==='warn'?'⚠':a.tipo==='ok'?'✓':'ℹ'}</span>
      <span>${a.texto}</span>
    </div>`).join('');

  const sessoesHTML = Object.entries(r.sessoes||{}).map(([sId,s])=>{
    const exHTML = (s.exercicios||[]).map((e,i)=>`
      <div class="motor-ex">
        <div class="motor-ex-n">${i+1}.</div>
        <div style="flex:1;">
          <div class="motor-ex-nome">${e.nome}</div>
          ${e.motivo?`<div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);margin-top:1px;">${e.motivo}</div>`:''}
        </div>
        <div class="motor-ex-det">${e.detalhe||''}</div>
      </div>`).join('');
    return `
      <div class="motor-sessao">
        <div class="motor-sessao-header">
          <div class="motor-sessao-id">${sId}</div>
          <div class="motor-sessao-tipo">${s.tipo||''}</div>
          <div class="motor-sessao-dur">${s.duracao||''}</div>
        </div>
        ${s.foco?`<div class="motor-sessao-foco">// ${s.foco}</div>`:''}
        <div class="motor-exercicios">${exHTML}</div>
      </div>`;
  }).join('');

  return `
    <div class="motor-result">
      <div class="motor-result-header">
        <div>
          <div class="motor-result-title" style="color:${cor};">Diagnóstico · Semana ${r.semana||'—'}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);margin-top:2px;">
            Gap prioritário: <span style="color:${cor};">${r.gap_prioritario||'—'}</span>
            &nbsp;·&nbsp;<span style="color:${cargaCor};">${cargaLabel}</span>
          </div>
        </div>
        <div class="motor-result-meta">${now}</div>
      </div>
      ${alertaMentalHTML}
      <div class="motor-diagnostico">
        ${(r.diagnostico_narrativo||'').replace(/\n/g,'<br>')}
        <br><br>
        <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);">// foco semanal: </span>
        <b>${r.gap_prioritario||'—'}</b>
        <span class="motor-gap-badge ${gapStatus}">${gapStatus}</span>
        <br>
        <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);">${r.justificativa_gap||''}</span>
      </div>
      ${alertasHTML?`<div class="motor-alertas">${alertasHTML}</div>`:''}
      <div class="motor-sessoes">
        <div class="motor-sessoes-title">// plano das sessões</div>
        ${sessoesHTML}
      </div>
    </div>`;
}


// ══════════════════════════════════════════════════
// MÓDULO JOGOS — FASE 3: INTEGRAÇÃO VEO
// Chave localStorage: veo_jogos (nova, sem conflito)
// ══════════════════════════════════════════════════

const VEO_KEY = 'veo_jogos';

function veoLoad() {
  try { return JSON.parse(localStorage.getItem(VEO_KEY) || '[]'); } catch(e) { return []; }
}
function veoSave(jogos) {
  localStorage.setItem(VEO_KEY, JSON.stringify(jogos));
}
function veoJogosDoAtleta(atleta) {
  return veoLoad().filter(j => j.atleta === atleta).sort((a,b) => new Date(b.data) - new Date(a.data));
}

// Conectores Veo — campos mapeados para quando a câmera chegar

function veoSalvarJogo() {
  const data       = document.getElementById('vj_data')?.value;
  const adversario = document.getElementById('vj_adversario')?.value?.trim();
  const placar     = document.getElementById('vj_placar')?.value?.trim();
  const local      = document.getElementById('vj_local')?.value;
  const modalidade = document.getElementById('vj_modalidade')?.value;
  const obs        = document.getElementById('vj_obs')?.value?.trim();

  if (!data || !adversario) {
    alert('Preencha pelo menos data e adversário para salvar.');
    return;
  }

  const campos = player === 'lucas' ? VEO_CAMPOS_LUCAS : VEO_CAMPOS_MIGUEL;
  const stats = {};
  campos.forEach(c => {
    const el = document.getElementById('vj_' + c.key);
    if (el && el.value && el.value !== '— selecionar —') {
      stats[c.key] = c.tipo === 'numero' ? (parseFloat(el.value) || el.value) : el.value;
    }
  });

  const jogo = {
    id: Date.now().toString(),
    atleta: player,
    data, adversario, placar, local, modalidade, obs,
    stats,
    criadoEm: new Date().toISOString()
  };

  const jogos = veoLoad();
  jogos.unshift(jogo);
  veoSave(jogos);

  rJogos(); // re-render
}

function veoDeletarJogo(id) {
  if (!confirm('Remover este jogo do histórico?')) return;
  const jogos = veoLoad().filter(j => j.id !== id);
  veoSave(jogos);
  rJogos();
}

function veoToggleJogo(id) {
  const el = document.getElementById('vjbody_' + id);
  if (el) el.classList.toggle('open');
}

function rJogos() {
  const p = player;
  const cor = p === 'lucas' ? 'var(--lucas)' : 'var(--miguel)';
  const camposDef = p === 'lucas' ? VEO_CAMPOS_LUCAS : VEO_CAMPOS_MIGUEL;
  const cruzamentos = VEO_CRUZAMENTOS[p];
  const jogos = veoJogosDoAtleta(p);
  const perfil = PERFIL_ATLETA[p];
  const nomeCurto = p === 'lucas' ? 'Lucas #30' : 'Miguel (Goleiro)';

  // ── Formulário de registro
  const formInputs = camposDef.map(c => {
    if (c.tipo === 'select') {
      return `<div class="veo-field">
        <label class="veo-label">${c.label}</label>
        <select class="veo-select" id="vj_${c.key}">
          ${c.opcoes.map(o => `<option value="${o}">${o}</option>`).join('')}
        </select>
      </div>`;
    }
    return `<div class="veo-field">
      <label class="veo-label">${c.label}${c.unit ? ' ('+c.unit+')' : ''}</label>
      <input class="veo-input" type="number" id="vj_${c.key}" placeholder="${c.placeholder}" min="0" step="any">
    </div>`;
  }).join('');

  // ── Player Spotlight: stats do último jogo
  const ultimo = jogos[0];
  const spotlightStats = ultimo
    ? camposDef.filter(c => ultimo.stats[c.key] !== undefined).map(c => {
        const val = ultimo.stats[c.key];
        return `<div class="veo-stat-row">
          <span class="veo-stat-lbl">${c.label}</span>
          <span class="veo-stat-val has-data">${val}<span class="veo-stat-unit">${c.unit||''}</span></span>
        </div>`;
      }).join('')
    : `<div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);text-align:center;padding:16px 0;">Nenhum jogo registrado ainda</div>`;

  const spotlightPlacar = ultimo ? `<div style="font-family:'DM Serif Display',serif;font-size:11px;color:var(--td);margin-bottom:6px;">${ultimo.adversario} · ${ultimo.placar||'—'} · ${new Date(ultimo.data).toLocaleDateString('pt-BR')}</div>` : '';

  // ── Cruzamento gaps → campos Veo
  const cruzHTML = cruzamentos.map(c => {
    // Verificar se já existe dado nos jogos
    const temDado = jogos.some(j => j.stats[c.campo] !== undefined);
    const dotCls = temDado ? 'ok' : c.campo ? 'aguarda' : 'aguarda';
    const connCls = temDado ? 'pronto' : 'aguarda';
    const connTxt = temDado ? `✓ ${c.campo}` : c.campo ? `aguarda: ${c.campo}` : 'observacional';
    return `<div class="veo-cross-item">
      <div class="veo-cross-dot ${dotCls}"></div>
      <div class="veo-cross-info">
        <div class="veo-cross-gap">${c.gap}</div>
        <div class="veo-cross-desc">${c.desc}</div>
      </div>
      <div class="veo-cross-connector ${connCls}">${connTxt}</div>

  // ── Histórico de jogos
  const histHTML = jogos.length === 0
    ? `<div class="veo-empty-jogos">⬜ nenhum jogo registrado ainda<br><br>quando a câmera Veo chegar,<br>registre o primeiro jogo acima.</div>`

        const statsHTML = camposDef.filter(c => j.stats[c.key] !== undefined).map(c => `
          <div class="veo-mini-stat">
            <div class="veo-mini-lbl">${c.label}</div>
            <div class="veo-mini-val">${j.stats[c.key]}${c.unit ? '<span style="font-size:10px;color:var(--td);">'+c.unit+'</span>' : ''}</div>
          </div>`).join('');
        const obsHTML = j.obs ? `<div class="veo-jogo-obs">${j.obs}</div>` : '';
        const dt = new Date(j.data).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit'});

          <div class="veo-jogo-header" onclick="veoToggleJogo('${j.id}')">
            <div class="veo-jogo-num">${jogos.length - i}</div>
            <div class="veo-jogo-info">
              <div class="veo-jogo-data">${dt} · ${j.modalidade||'Fut7'} · ${j.local||'—'}</div>
              <div class="veo-jogo-adversario">vs ${j.adversario}</div>
            </div>
            <div class="veo-jogo-placar">${j.placar||'?'}</div>
          </div>
          <div class="veo-jogo-body" id="vjbody_${j.id}">
            <span class="veo-jogo-del" onclick="veoDeletarJogo('${j.id}')">✕ remover</span>
            ${statsHTML ? `<div class="veo-jogo-stats">${statsHTML}</div>` : '<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--td);margin-bottom:8px;">— sem stats Veo registrados —</div>'}
            ${obsHTML}
          </div>
        </div>`;
      }).join('');

  // ── Evolução comparativa (jogo 1 vs último)
  let evoHTML = '';
  if (jogos.length >= 2) {
    const primeiro = jogos[jogos.length - 1];
    const ultimo2 = jogos[0];
    const camposNumericos = camposDef.filter(c => c.tipo === 'numero');
    const rows = camposNumericos.filter(c => primeiro.stats[c.key] !== undefined && ultimo2.stats[c.key] !== undefined).map(c => {
      const v1 = parseFloat(primeiro.stats[c.key]) || 0;
      const v2 = parseFloat(ultimo2.stats[c.key]) || 0;
      const max = Math.max(v1, v2, 1);
      const pct1 = Math.round(v1 / max * 100);
      const pct2 = Math.round(v2 / max * 100);
      return `<div style="margin-bottom:10px;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--td);letter-spacing:1px;margin-bottom:4px;">${c.label.toUpperCase()}</div>
        <div class="veo-evo-row">
          <span class="veo-evo-lbl">Jogo 1</span>
          <div class="veo-evo-bg"><div class="veo-evo-fill" style="width:${pct1}%;opacity:.5;"></div></div>
          <span class="veo-evo-val">${v1}</span>

        <div class="veo-evo-row" style="margin-top:3px;">
          <span class="veo-evo-lbl">Jogo ${jogos.length}</span>
          <div class="veo-evo-bg"><div class="veo-evo-fill" style="width:${pct2}%;"></div></div>
          <span class="veo-evo-val">${v2}</span>
        </div>
      </div>`;
    }).join('');
    if (rows) {
      evoHTML = `<div class="veo-evo">
        <div class="veo-evo-title">// dossiê evolutivo — jogo 1 vs jogo ${jogos.length}</div>
        ${rows}
      </div>`;
    }
  }

  document.getElementById('wrap').innerHTML = `
    <div class="veo-wrap">

      <!-- HEADER -->
      <div class="veo-header">
        <div class="veo-title" style="color:${cor};">🎥 Análise de Jogo — ${nomeCurto}</div>
        <div class="veo-badge">câmera: aguardando</div>
      </div>

      <div class="veo-pending">
        ⚡ Conectores prontos — preencha quando a câmera Veo chegar e o primeiro jogo for gravado.
      </div>

      <!-- PLAYER SPOTLIGHT -->
      <div class="veo-spotlight">
        <div class="veo-player-card ${p}-card">
          <div class="veo-player-num">${p === 'lucas' ? '30' : '1'}</div>
          <div class="veo-player-name" style="color:${cor};">${perfil.nome}</div>
          <div class="veo-player-pos">${perfil.posicao} · ${perfil.modalidade}</div>
          ${spotlightPlacar}
          ${spotlightStats}
        </div>
        <div class="veo-cross">
          <div class="veo-cross-title">// gaps × conectores veo</div>
          ${cruzHTML}
        </div>
      </div>

      <!-- FORMULÁRIO -->
      <div class="veo-form-card">
        <div class="veo-form-title">// registrar novo jogo</div>

        <div class="veo-section">identificação</div>
        <div class="veo-grid">
          <div class="veo-field">
            <label class="veo-label">Data do jogo</label>
            <input class="veo-input" type="date" id="vj_data" value="${new Date().toISOString().split('T')[0]}">
          </div>
          <div class="veo-field">
            <label class="veo-label">Adversário</label>
            <input class="veo-input" type="text" id="vj_adversario" placeholder="Ex: Náutico Sub-13">
          </div>
          <div class="veo-field">
            <label class="veo-label">Placar</label>
            <input class="veo-input" type="text" id="vj_placar" placeholder="Ex: 3-1">
          </div>
          <div class="veo-field">
            <label class="veo-label">Modalidade</label>
            <select class="veo-select" id="vj_modalidade">
              <option>Fut7</option>
              <option>Futsal</option>
              <option>Fut11</option>
              <option>Rachão</option>
            </select>
          </div>
          <div class="veo-field">
            <label class="veo-label">Local</label>
            <select class="veo-select" id="vj_local">
              <option>Casa</option>
              <option>Fora</option>
              <option>Neutro</option>
            </select>
          </div>
        </div>

        <div class="veo-section">stats veo — ${p === 'lucas' ? 'jogador de campo (#30)' : 'goleiro'}</div>
        <div class="veo-hint" style="margin-bottom:10px;">Deixe em branco o que não tiver dados. Preencha quando tiver o app do Veo aberto após o jogo.</div>
        <div class="veo-grid">
          ${formInputs}
        </div>

// FASE 5 — PERFORMANCE CLOCK & DOSSIÊ ELITE
// Chave localStorage: performance_clock
// Inspirado no EPPP inglês (Elite Player Performance Plan)
// ══════════════════════════════════════════════════

const CLOCK_KEY = 'performance_clock';

function clockLoad() {
  try { return JSON.parse(localStorage.getItem(CLOCK_KEY) || '{"lucas":[],"miguel":[]}'); }
  catch(e) { return {lucas:[], miguel:[]}; }
}
function clockSave(data) {
  localStorage.setItem(CLOCK_KEY, JSON.stringify(data));
}
function clockEntries(atleta) {
  const d = clockLoad();
  return (d[atleta] || []).sort((a,b) => new Date(b.data) - new Date(a.data));
}

// Detecta marcos automáticos comparando diagnósticos salvos
// Chamado após rodarMotor() — compara gap atual vs histórico
function clockDetectarMarcos(atletaNome, novoResultado) {
  if (!novoResultado || !novoResultado.gap_prioritario) return;
  const hist = JSON.parse(localStorage.getItem('motor_historico') || '[]')
    .filter(r => r.atleta === atletaNome);
  if (hist.length < 2) return;

  const perfil = PERFIL_ATLETA[atletaNome];
  if (!perfil) return;

  // Verifica se algum gap melhorou ≥ 1.0 ponto desde a última vez que foi prioritário
  const gapAtual = novoResultado.gap_prioritario;
  const notaAtual = perfil.gaps[gapAtual]?.nota;
  if (!notaAtual) return;

  // Busca último diagnóstico que focou no mesmo gap
  const anterior = hist.slice(1).find(r => r.gap_prioritario === gapAtual);
  if (!anterior) return;

  const notaAnterior = PERFIL_ATLETA[atletaNome]?.gaps?.[gapAtual]?.nota;
  // Como as notas são estáticas no perfil, usamos a nota atual como referência
  // Marco automático: gap saiu de urgente para planejado ou planejado para completo
  const statusAnterior = perfil.gaps[gapAtual]?.status;
  if (statusAnterior === 'urgente') {
    // Detecta se foi marcado como melhorado (avaliação "evoluiu" recente)
    const recente = dados.filter(d => d.atleta === atletaNome && d.av === 'evoluiu')
      .sort((a,b) => new Date(b.data) - new Date(a.data)).slice(0,3);
    if (recente.length >= 2) {
      clockAdicionarMarco(atletaNome, {
        tipo: 'auto',
        categoria: 'evolucao',
        titulo: `Evolução detectada: ${gapAtual}`,
        descricao: `Motor detectou padrão de melhora em ${gapAtual}. ${recente.length} treinos seguidos com avaliação positiva.`,
        gap: gapAtual,
        semana: novoResultado.semana
      });
    }
  }
}

function clockAdicionarMarco(atletaNome, marco) {
  const d = clockLoad();
  if (!d[atletaNome]) d[atletaNome] = [];
  const novo = {
    id: Date.now().toString(),
    data: new Date().toISOString(),
    atleta: atletaNome,
    ...marco
  };
  d[atletaNome].unshift(novo);
  clockSave(d);
}

function clockRemoverMarco(atletaNome, id) {
  const d = clockLoad();
  if (!d[atletaNome]) return;
  d[atletaNome] = d[atletaNome].filter(m => m.id !== id);
  clockSave(d);
  rClock();
}

// Gera narrativa textual de evolução a partir dos marcos
function clockNarrativa(atleta) {
  const entries = clockEntries(atleta);
  if (!entries.length) return [];
  // Pega marcos de evolução e milestone
  return entries
    .filter(e => ['evolucao','milestone','conquista'].includes(e.categoria))
    .slice(0, 6)
    .map(e => {
      const mes = new Date(e.data).toLocaleDateString('pt-BR', {month:'short', year:'numeric'});
      return `${mes.charAt(0).toUpperCase() + mes.slice(1)}: ${e.titulo}`;
    });
}

// ── Checklist para o dossiê PDF
function clockChecklist(atleta) {
  const entries = clockEntries(atleta);
  const veoJogos = veoJogosDoAtleta(atleta);
  const bio = bioAthlete(atleta === 'lucas' ? 'Lucas' : 'Miguel');
  const diagHist = JSON.parse(localStorage.getItem('motor_historico') || '[]').filter(r => r.atleta === atleta);

  return [
    { label: 'Perfil biométrico (PHV, altura, peso)', ok: !!(bio && bio.records && bio.records.length >= 1), warn: !!(bio && bio.records && bio.records.length >= 1 && bio.records.length < 3) },
    { label: `${entries.length} marco${entries.length !== 1 ? 's' : ''} no Performance Clock`, ok: entries.length >= 3, warn: entries.length >= 1 && entries.length < 3 },
    { label: `${diagHist.length} diagnóstico${diagHist.length !== 1 ? 's' : ''} gerado${diagHist.length !== 1 ? 's' : ''}`, ok: diagHist.length >= 4, warn: diagHist.length >= 1 && diagHist.length < 4 },
    { label: `${veoJogos.length} jogo${veoJogos.length !== 1 ? 's' : ''} registrado${veoJogos.length !== 1 ? 's' : ''} (Veo)`, ok: veoJogos.length >= 3, warn: veoJogos.length >= 1 && veoJogos.length < 3 },
  ];

function mentalSw(sw){
  sessionStorage.setItem(`mental_sw_${player}`, sw);
  rMental();
}

function mentalChangeSem(val){
  sessionStorage.setItem(`mental_semsel_${player}`, val);
  rMental();
}

function mentalSelResp(id, val){
  window._mentalRespostas = window._mentalRespostas || {};
  window._mentalRespostas[id] = val;
  // Atualizar visual
  document.querySelectorAll(`[onclick*="mentalSelResp('${id}'"]`).forEach(b=>{
    b.classList.remove('sel');
  });
  event.target.classList.add('sel');
}

function mentalSalvar(){
  const p = player;
  const storeSemanal = 'mental_semanal';
  let semanal = [];
  try { semanal = JSON.parse(localStorage.getItem(storeSemanal) || '[]'); } catch(e){}

  const semSel = sessionStorage.getItem(`mental_semsel_${p}`) || 'Semana 1';
  const sw = sessionStorage.getItem(`mental_sw_${p}`) || 'pai';
  const respostas = window._mentalRespostas || {};
  const nota = sw==='pai' ? (document.getElementById('mentalNota')?.value || '') : '';

  // Calcular score (média das respostas, escala 1-4 → 0-10)
  const vals = Object.values(respostas).filter(v=>v!=null);
  const scoreRaw = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : null;
  const score = scoreRaw != null ? ((scoreRaw-1)/3)*10 : null;

  // Calcular dimensões a partir das respostas
  const dimMap = sw==='pai'
    ? {concentracao:'conc', coragem:'cor', recuperacao:'rec', comunicacao:'com', energia:'ene'}
    : {concentracao:'foc', coragem:'con', recuperacao:'err', comunicacao:'ani', energia:'sem'};
  const dimensoes = {};
  Object.entries(dimMap).forEach(([dim,qid])=>{
    if(respostas[qid]!=null) dimensoes[dim] = ((respostas[qid]-1)/3)*10;
  });

  // Remover entrada existente para semana+fonte
  const filtered = semanal.filter(e => !(e.atleta===p && e.semana===semSel && e.fonte===sw));

  const entrada = {
    atleta: p,
    semana: semSel,
    fonte: sw,
    data: new Date().toLocaleDateString('pt-BR'),
    respostas,
    dimensoes,
    score,
    nota
  };

  filtered.push(entrada);
  localStorage.setItem(storeSemanal, JSON.stringify(filtered));

  // Sincronizar estado mental no motor
  if(score!=null){
    const estadoEl = document.getElementById('estadoMental');
    if(estadoEl){
      if(score>=7.5) estadoEl.value='alto';
      else if(score>=5) estadoEl.value='normal';
      else estadoEl.value='pos_erro';
    }
  }

  // Detectar queda > 1.5 pts → marco automático no Clock
  const semAtleta = filtered.filter(e=>e.atleta===p && e.score!=null).slice(-2);
  if(semAtleta.length===2){
    const diff = semAtleta[1].score - semAtleta[0].score;
    if(diff <= -1.5 && typeof clockSalvarMarco === 'function'){
      clockSalvarMarco({
        atleta: p,
        tipo: 'auto',
        categoria: 'Mental',
        titulo: `Queda mental detectada — ${semSel}`,
        descricao: `Score caiu de ${semAtleta[0].score.toFixed(1)} para ${semAtleta[1].score.toFixed(1)}`,
        data: new Date().toISOString().split('T')[0]
      });
    }
  }

  rMental();
  // Flash de confirmação
  setTimeout(()=>{
    const btn = document.querySelector('.mental-save-btn');
    if(btn){ btn.textContent='✅ Salvo!'; btn.style.background='rgba(76,175,80,0.2)'; btn.style.borderColor='#4CAF50'; }
  }, 100);
}

function mentalSalvarDiario(){
  const p = player;
  const txt = document.getElementById('diarioTxt')?.value?.trim();
  if(!txt) return;
  const storeDiario = 'diario_cognitivo';
  let diario = [];
  try { diario = JSON.parse(localStorage.getItem(storeDiario) || '[]'); } catch(e){}
  diario.push({
    atleta: p,
    data: new Date().toLocaleDateString('pt-BR'),
    hora: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    sessao: 'S1/S3',
    texto: txt
  });
  localStorage.setItem(storeDiario, JSON.stringify(diario));
  rMental();
}

function mentalDel(idx){
  const p = player;
  const storeSemanal = 'mental_semanal';
  let semanal = [];
  try { semanal = JSON.parse(localStorage.getItem(storeSemanal) || '[]'); } catch(e){}
  const semAtleta = semanal.filter(e=>e.atleta===p);
  const outros = semanal.filter(e=>e.atleta!==p);
  semAtleta.splice(idx,1);
  localStorage.setItem(storeSemanal, JSON.stringify([...outros, ...semAtleta]));
  rMental();
}

function rNutricao() {
  const p = player;
  const perfil = PERFIL_ATLETA[p];
  const cor = p === 'lucas' ? 'var(--lucas)' : 'var(--miguel)';
  const corHex = p === 'lucas' ? '#2C4A6E' : '#2C5E3F';

  // Ler dados clínicos
  const bio = bioAthlete(perfil.nome);
  const ultimo = bio?.records ? [...bio.records].sort((a,b)=>new Date(b.date)-new Date(a.date))[0] : null;
  const exame = bio?.exames ? [...bio.exames].sort((a,b)=>new Date(b.date)-new Date(a.date))[0] : null;

  // PHV
  let fasePhv = 'desconhecido', phvOffset = null;

            <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--td);">${m.e}</div>
          </div>`).join('')}
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--td);margin-bottom:8px;text-transform:uppercase;">Micronutrientes prioritários</div>
      ${plano.micronutrientes.map(m=>`<div style="font-size:11px;color:var(--ts);padding:4px 0 4px 10px;border-left:2px solid ${plano.cor}44;">→ ${m}</div>`).join('')}
