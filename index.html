<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Treino — Lucas & Miguel</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:#060b12;--bg-card:#0c1520;--bg-card2:#0f1a27;
  --border:rgba(0,255,200,0.10);--text-primary:#e8f4f8;
  --text-secondary:#7a9bb5;--text-dim:#3a5268;

  --lucas:#3b9eff;--lucas-dim:rgba(59,158,255,0.12);
  --lucas-border:rgba(59,158,255,0.25);
  --lucas-glow:0 0 24px rgba(59,158,255,0.30);
  --lucas-deep:#0a1628;
  --miguel:#00e87a;--miguel-dim:rgba(0,232,122,0.10);
  --miguel-border:rgba(0,232,122,0.25);
  --miguel-glow:0 0 24px rgba(0,232,122,0.28);
  --miguel-deep:#071a0f;
  --accent:#3b9eff;--accent-dim:rgba(59,158,255,0.12);
  --accent-border:rgba(59,158,255,0.25);
  --accent-glow:0 0 24px rgba(59,158,255,0.30);
  --accent-deep:#0a1628;
  --tatico:#ff9800;--tatico-dim:rgba(255,152,0,0.10);--tatico-border:rgba(255,152,0,0.30);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(0,255,200,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,200,0.018) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0;}

.page{display:none;position:relative;z-index:1;}
.page.active{display:block;}
#page-home{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
#page-home.active{display:flex;}
.home-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:20px;text-align:center;}
.home-title{font-family:'Rajdhani',sans-serif;font-size:clamp(36px,8vw,72px);font-weight:700;letter-spacing:-1px;line-height:1;text-align:center;margin-bottom:8px;background:linear-gradient(135deg,#3b9eff 0%,#00e87a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.home-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:64px;letter-spacing:0.5px;}
.home-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:28px;text-align:center;}
.players-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:520px;}
.player-btn{position:relative;overflow:hidden;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:36px 24px;cursor:pointer;transition:all 0.25s ease;text-align:center;text-decoration:none;display:block;}
.player-btn.lucas{border-top:3px solid var(--lucas);}
.player-btn.miguel{border-top:3px solid var(--miguel);}
.player-btn:hover{transform:translateY(-3px);}
.player-btn.lucas:hover{background:var(--lucas-deep);box-shadow:var(--lucas-glow);border-color:var(--lucas-border);}
.player-btn.miguel:hover{background:var(--miguel-deep);box-shadow:var(--miguel-glow);border-color:var(--miguel-border);}
.player-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:100%;background:linear-gradient(180deg,currentColor 0%,transparent 100%);opacity:0;transition:opacity 0.25s;}
.player-btn.lucas{color:rgba(59,158,255,0.04);}
.player-btn.miguel{color:rgba(0,232,122,0.04);}
.player-btn:hover::before{opacity:1;}
.player-emoji{font-size:32px;margin-bottom:16px;display:block;}
.player-name{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px;}
.player-btn.lucas .player-name{color:var(--lucas);}
.player-btn.miguel .player-name{color:var(--miguel);}
.player-role{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
#page-training{display:none;min-height:100vh;}
#page-training.active{display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(6,11,18,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--accent-border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.3s;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.back-btn{background:none;border:1px solid var(--accent-border);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 10px;border-radius:2px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.back-btn:hover{background:var(--accent-dim);}
.topbar-name{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);transition:color 0.3s;}
.topbar-day{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--text-secondary);padding:4px 8px;border:1px solid var(--border);border-radius:2px;}
.training-layout{display:flex;flex:1;min-height:0;}
.sidebar{width:200px;min-width:200px;background:var(--bg-card);border-right:1px solid var(--accent-border);padding:24px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;transition:border-color 0.3s;flex-shrink:0;}
.sidebar-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:0 20px 16px;}
.day-btn{display:flex;align-items:center;gap:10px;width:100%;padding:14px 20px;background:none;border:none;cursor:pointer;transition:all 0.2s;text-align:left;position:relative;}
.day-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);opacity:0;transition:opacity 0.2s;}
.day-btn:hover{background:var(--accent-dim);}
.day-btn.active{background:var(--accent-dim);}
.day-btn.active::before{opacity:1;}
.day-btn-number{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px;min-width:18px;}
.day-btn.active .day-btn-number{color:var(--accent);}
.day-btn-label{font-size:13px;font-weight:400;color:var(--text-secondary);transition:color 0.2s;}
.day-btn:hover .day-btn-label,.day-btn.active .day-btn-label{color:var(--text-primary);}
.day-btn-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:0;margin-left:auto;transition:opacity 0.2s;}
.day-btn.active .day-btn-dot{opacity:1;}
.day-btn.domingo .day-btn-label{color:var(--text-dim);}
.day-btn.domingo .day-btn-number{color:var(--text-dim);opacity:0.5;}
.main-content{flex:1;overflow-y:auto;padding:32px 28px 60px;max-width:800px;}
.day-header{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--accent-border);}
.day-tema{font-family:'Rajdhani',sans-serif;font-size:clamp(24px,4vw,36px);font-weight:700;letter-spacing:-0.5px;color:var(--accent);margin-bottom:6px;}
.day-foco{font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:8px;}
.day-foco::before{content:'//';font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);opacity:0.5;}
.aquecimento-block{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--accent);padding:16px 20px;margin-bottom:28px;border-radius:2px;}
.aquecimento-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);opacity:0.7;margin-bottom:8px;}
.aquecimento-text{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.exercises-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:16px;}
.exercise-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;margin-bottom:10px;overflow:hidden;transition:all 0.2s ease;}
.exercise-card:hover{border-color:var(--accent-border);box-shadow:var(--accent-glow);}
/* CARD TÁTICO — borda laranja */
.exercise-card.tatico{border-left:3px solid var(--tatico);}
.exercise-card.tatico:hover{border-color:var(--tatico-border);box-shadow:0 0 18px rgba(255,152,0,0.20);}
.exercise-card.tatico .exercise-num{background:rgba(255,152,0,0.12);color:var(--tatico);border-right-color:var(--tatico-border);}
.exercise-card.tatico .exercise-volume{color:var(--tatico);}
.tatico-badge{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tatico);background:rgba(255,152,0,0.10);border:1px solid rgba(255,152,0,0.25);padding:2px 7px;border-radius:2px;margin-bottom:6px;}
.exercise-header{display:flex;align-items:center;gap:0;cursor:pointer;user-select:none;}
.exercise-num{width:44px;min-width:44px;height:60px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--accent);border-right:1px solid var(--accent-border);transition:background 0.2s;flex-shrink:0;}
.exercise-title-block{flex:1;padding:14px 16px;}
.exercise-name{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-primary);margin-bottom:4px;}
.exercise-volume{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.5px;color:var(--accent);}
.exercise-chevron{padding:0 16px;color:var(--text-dim);font-size:12px;transition:transform 0.2s;flex-shrink:0;}
.exercise-card.open .exercise-chevron{transform:rotate(180deg);}
.exercise-body{display:none;padding:0 16px 20px 16px;border-top:1px solid var(--border);}
.exercise-card.open .exercise-body{display:block;}
.exercise-instructions{padding:16px 0 0;}
.instruction-line{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13.5px;color:var(--text-secondary);line-height:1.6;}
.instruction-line::before{content:'→';color:var(--accent);opacity:0.6;font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:3px;flex-shrink:0;}
.exercise-tip{margin-top:14px;padding:10px 14px;background:rgba(0,0,0,0.3);border-left:2px solid var(--accent);border-radius:2px;}
.exercise-tip-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);opacity:0.7;margin-bottom:4px;}
.exercise-tip-text{font-size:12px;color:var(--text-secondary);font-style:italic;line-height:1.5;}
.video-block{display:flex;align-items:center;gap:12px;margin-top:16px;padding:12px 14px;background:var(--bg-card2);border:1px solid var(--accent-border);border-radius:4px;flex-wrap:wrap;}
.video-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-right:auto;width:100%;margin-bottom:8px;}
.video-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#060b12;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 18px;border-radius:3px;text-decoration:none;border:none;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.video-btn:hover{opacity:0.88;transform:scale(1.02);}
.video-btn svg{width:14px;height:14px;fill:currentColor;}
.video-timestamp{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--accent);padding:6px 10px;border:1px solid var(--accent-border);border-radius:2px;}
.qr-container{display:flex;flex-direction:column;align-items:center;margin-left:auto;}
.qr-img{width:72px;height:72px;background:white;padding:4px;border-radius:2px;display:flex;align-items:center;justify-content:center;}
.qr-img img{width:100%;height:100%;}
.qr-label{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-top:4px;text-align:center;}
.finalizacao-block{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:18px 20px;margin-top:24px;}
.finalizacao-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
.finalizacao-text{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.dica-block{margin-top:16px;padding:16px 20px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:4px;font-size:13.5px;color:var(--text-primary);line-height:1.6;font-weight:500;}

/* FILMAR BUTTON — sempre visível abaixo do header do card */
.filmar-block{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(230,92,0,0.05);border-top:1px solid rgba(230,92,0,0.15);flex-wrap:wrap;}
.btn-filmar{display:inline-flex;align-items:center;gap:6px;background:#E65C00;color:white;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:3px;border:none;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.btn-filmar:hover{background:#FF6D00;}
.btn-concluir{display:inline-flex;align-items:center;gap:6px;background:transparent;color:#4CAF50;border:1px solid #4CAF50;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;border-radius:3px;cursor:pointer;transition:all 0.2s;}
.btn-concluir:hover{background:rgba(76,175,80,0.10);}
.btn-concluir.done{background:rgba(76,175,80,0.12);border-color:#4CAF50;}
.upload-progress{margin-top:0;background:rgba(0,0,0,0.4);border-radius:3px;height:3px;overflow:hidden;display:none;width:100%;}
.upload-bar{height:100%;background:#E65C00;border-radius:3px;transition:width 0.3s;width:0%;}
.upload-status{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;color:#E65C00;margin-top:2px;display:none;width:100%;}

/* concluido state */
.exercise-card.concluido{border-color:rgba(76,175,80,0.35);}
.exercise-card.concluido .exercise-num{background:rgba(76,175,80,0.12);color:#4CAF50;}

.sidebar-toggle{display:none;background:none;border:1px solid var(--accent-border);color:var(--accent);padding:6px 10px;border-radius:2px;cursor:pointer;font-size:16px;}
@media(max-width:640px){
  .players-grid{grid-template-columns:1fr;max-width:280px;}
  .player-btn{padding:28px 20px;}
  .sidebar{position:fixed;left:0;top:56px;bottom:0;z-index:40;transform:translateX(-100%);transition:transform 0.28s ease;width:220px;}
  .sidebar.open{transform:translateX(0);}
  .sidebar-toggle{display:flex;align-items:center;}
  .main-content{padding:24px 16px 60px;}
  .training-layout{flex-direction:column;}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:39;}
  .sidebar-overlay.show{display:block;}
  .topbar{padding:0 14px;}
  .video-block{flex-direction:column;align-items:flex-start;}
  .qr-container{margin-left:0;}
}
</style>
</head>
<body>

<div id="page-home" class="page active">
  <div class="home-eyebrow">⚽ programa de treino 2026</div>
  <h1 class="home-title">Treino</h1>
  <p class="home-sub">Seleciona quem vai treinar hoje</p>
  <div class="home-label">// escolha o jogador</div>
  <div class="players-grid">
    <button class="player-btn lucas" onclick="selectPlayer('lucas')">
      <span class="player-emoji">⚡</span>
      <span class="player-name">Lucas</span>
      <span class="player-role">13 anos · meio-campo</span>
    </button>
    <button class="player-btn miguel" onclick="selectPlayer('miguel')">
      <span class="player-emoji">🧤</span>
      <span class="player-name">Miguel</span>
      <span class="player-role">12 anos · goleiro</span>
    </button>
  </div>
  <div style="margin-top:40px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center;">
    <a href="painel_motor.html" style="display:inline-flex;align-items:center;gap:8px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;padding:8px 0;transition:color 0.2s;" onmouseover="this.style.color='var(--text-secondary)'" onmouseout="this.style.color='var(--text-dim)'">
      → painel do pai
    </a>
    <a href="painel_motor.html?view=mental&sw=atleta" style="display:inline-flex;align-items:center;gap:8px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;padding:8px 0;transition:color 0.2s;" onmouseover="this.style.color='var(--text-secondary)'" onmouseout="this.style.color='var(--text-dim)'">
      🧠 olhar do atleta
    </a>
  </div>
</div>

<div id="page-training" class="page">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="goHome()">← Voltar</button>
      <span class="topbar-name" id="topbar-name">Lucas</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="topbar-day" id="topbar-day">S1</span>
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    </div>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="training-layout">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-label">// sessões da semana</div>
      <button class="day-btn" onclick="selectDay(0)"><span class="day-btn-number">S1</span><span class="day-btn-label">Sessão 1</span><span class="day-btn-dot"></span></button>
      <button class="day-btn" onclick="selectDay(1)"><span class="day-btn-number">S2</span><span class="day-btn-label">Sessão 2</span><span class="day-btn-dot"></span></button>
      <button class="day-btn" onclick="selectDay(2)"><span class="day-btn-number">S3</span><span class="day-btn-label">Sessão 3</span><span class="day-btn-dot"></span></button>
      <button class="day-btn" onclick="selectDay(3)"><span class="day-btn-number">S4</span><span class="day-btn-label">Sessão 4</span><span class="day-btn-dot"></span></button>
    </nav>
    <main class="main-content" id="main-content"></main>
  </div>
</div>


<script>
function yt(id,t){return`https://www.youtube.com/watch?v=${id}&t=${t}s`;}
function qrUrl(url){return`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;}
const V1="56vnjRkRuAQ",V2="cTQPT-S6W_Q",V3="-tKLzr5_nbc",V4="w6aTAnXnfm8";

// Estado persistido
let estado={};
try{estado=JSON.parse(localStorage.getItem('treino-estado')||'{}');}catch(e){}
function salvarEstado(){try{localStorage.setItem('treino-estado',JSON.stringify(estado));}catch(e){}}

// Semana relativa ao início do projeto (Marco 2026)
function getSemanaLabel(){
  const inicio=new Date('2026-03-01');
  const hoje=new Date();
  const diff=Math.floor((hoje-inicio)/(7*24*60*60*1000));
  const semNum=Math.max(1,diff+1);
  const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `S${semNum} ${meses[hoje.getMonth()]}/${hoje.getFullYear().toString().slice(2)}`;
}

const LUCAS=[
  { // SEGUNDA — Pliometria + Ball Feeling + Scanning
    tema:"⚡ Pliometria + Ball Feeling",
    foco:"Explosão de pernas + toque de bola + scanning (novo)",
    aquecimento:"5 min: polichinelos + skipping (joelhos altos) 3×15s + rotação de quadril",
    exercicios:[
      {id:"s1", nome:"Step A-Skip", volume:"3 séries × 30s | Descanso: 30s",
        instrucoes:["Em pé, levanta o joelho direito até a altura do quadril enquanto salta levemente no pé esquerdo.","Troca de perna em ritmo constante, sem parar.","Braços dobrados a 90° e se movem junto — direito sobe com joelho esquerdo."],
        dica:"Cotovelo a 90°, joelho sobe até o quadril", url:yt(V1,1), ts:"V1 → 0:01"},
      {id:"s2", nome:"High Knees", volume:"3 séries × 15s | Descanso: 30s",
        instrucoes:["Corrida no lugar levantando os joelhos o mais alto possível.","Mantém o tronco ereto — não incline para frente.","Quanto mais rápido você alterna as pernas, melhor o treino."],
        dica:"Tronco ereto, braços em movimento — não desce um joelho antes de subir o outro", url:yt(V1,17), ts:"V1 → 0:17"},
      {id:"s3", nome:"Speed Skaters", volume:"3 séries × 10s cada perna | Descanso: 40s",

let currentPlayer=null,currentDay=0;
const DAYS=["S1","S2","S3","S4"];

function selectPlayer(player){
  currentPlayer=player;currentDay=0;
  const r=document.documentElement;
  if(player==='lucas'){
    r.style.setProperty('--accent','var(--lucas)');
    r.style.setProperty('--accent-dim','var(--lucas-dim)');
    r.style.setProperty('--accent-border','var(--lucas-border)');
    r.style.setProperty('--accent-glow','var(--lucas-glow)');
    r.style.setProperty('--accent-deep','var(--lucas-deep)');
    document.getElementById('topbar-name').textContent='Lucas';
  } else {
    r.style.setProperty('--accent','var(--miguel)');
    r.style.setProperty('--accent-dim','var(--miguel-dim)');
    r.style.setProperty('--accent-border','var(--miguel-border)');
    r.style.setProperty('--accent-glow','var(--miguel-glow)');
    r.style.setProperty('--accent-deep','var(--miguel-deep)');
    document.getElementById('topbar-name').textContent='Miguel';
  }
  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-training').classList.add('active');
  selectDay(0);
}

function goHome(){
  document.getElementById('page-training').classList.remove('active');
  document.getElementById('page-home').classList.add('active');
  closeSidebar();
}

function selectDay(idx){
  currentDay=idx;
  document.querySelectorAll('.day-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.getElementById('topbar-day').textContent=DAYS[idx];
  renderDay(idx);
  closeSidebar();
  document.getElementById('main-content').scrollTop=0;
}

function renderDay(idx){
  const data=currentPlayer==='lucas'?LUCAS[idx]:MIGUEL[idx];
  const main=document.getElementById('main-content');

  let html=`
    <div class="day-header">
      <div class="day-tema">${data.tema}</div>
      <div class="day-foco">${data.foco}</div>

function toggleEx(id){

function marcarConcluido(id){
  const btn=document.getElementById('btn-'+id);
  const card=document.getElementById('card-'+id);
  if(estado[id+'-concluido']){
    delete estado[id+'-concluido'];
    btn.textContent='✓ Feito';btn.classList.remove('done');
    card.classList.remove('concluido');
  } else {
    estado[id+'-concluido']=true;
    btn.textContent='✓ Concluído';btn.classList.add('done');
    card.classList.add('concluido');
  }
  salvarEstado();
}

function filmarExercicio(id,nome){
  const input=document.createElement('input');
  input.type='file';

  input.onchange=(e)=>{
    processarVideo(e,id,nome);

  };
  document.body.appendChild(input);
  input.click();
}

async function getYtToken(){
  // Busca token do atleta atual no Supabase
  // A tabela tem: id, jogador, access_token, refresh_token, playlist_id, atualizado_em
  const r=await sbFetch('/rest/v1/youtube_tokens?select=id,access_token,refresh_token,atualizado_em&order=atualizado_em.desc&limit=1');
  const rows=await r.json();
  if(!rows||!rows.length) return null;
  let {id,access_token,refresh_token,atualizado_em}=rows[0];

  // Access token dura 1h — renova se passou mais de 50min desde atualizado_em
  const atualizado=new Date(atualizado_em);
  const expirado=(Date.now()-atualizado.getTime())>50*60*1000;

  if(expirado){
    const resp=await fetch('https://oauth2.googleapis.com/token',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        client_id:'184444339048-1fkagpi8hbmavlaqoqf2oht2sk3fqvno.apps.googleusercontent.com',
        client_secret:'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',
        refresh_token,
        grant_type:'refresh_token'
      })
    });
    const data=await resp.json();
    if(!data.access_token) return null;
    access_token=data.access_token;
    await sbFetch('/rest/v1/youtube_tokens?id=eq.'+id,{
      method:'PATCH',
      headers:{'Prefer':'return=minimal'},
      body:JSON.stringify({access_token,atualizado_em:new Date().toISOString()})
    });
  }
  return access_token;
}

async function uploadYouTube(file,titulo,atleta,accessToken){
  const playlistId=PLAYLISTS[atleta]||null;
  // 1. Inicia upload resumable
  const meta={snippet:{title:titulo,description:`Treino ${atleta} — ${new Date().toLocaleDateString('pt-BR')}`,categoryId:'17'},status:{privacyStatus:'unlisted'}};
  const initResp=await fetch('https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status',{
    method:'POST',
    headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json','X-Upload-Content-Type':file.type,'X-Upload-Content-Length':file.size},
    body:JSON.stringify(meta)
  });
  if(!initResp.ok) throw new Error('Falha ao iniciar upload: '+initResp.status);
  const uploadUrl=initResp.headers.get('Location');

  // 2. Faz upload do arquivo
  const uploadResp=await fetch(uploadUrl,{method:'PUT',headers:{'Content-Type':file.type},body:file});
  if(!uploadResp.ok) throw new Error('Falha no upload: '+uploadResp.status);
  const video=await uploadResp.json();
  const videoId=video.id;

  // 3. Adiciona à playlist do atleta
  if(playlistId){
    await fetch('https://www.googleapis.com/youtube/v3/playlistItems?part=snippet',{
      method:'POST',
      headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},
      body:JSON.stringify({snippet:{playlistId,resourceId:{kind:'youtube#video',videoId}}})
    });
  }
  return videoId;
}

async function registrarSupabase(exercicioId,nomeExercicio,atleta,semana,videoId){

      nome_exercicio: nomeExercicio,
      semana,
      youtube_id: videoId,
      data: new Date().toISOString()
    }),
    feedback: null
  };
  const r=await sbFetch('/rest/v1/avaliacoes',{
    method:'POST',
    headers:{'Prefer':'return=representation'},
    body:JSON.stringify(payload)
  });
  const result=await r.json();
  if(!r.ok){
    const msg=result?.message||result?.hint||result?.details||JSON.stringify(result);
    throw new Error('Supabase: '+msg);
  }
  return result;
}

async function processarVideo(e,id,nome){
  const file=e.target.files[0];
  if(!file)return;
  const prog=document.getElementById('prog-'+id);
  const bar=document.getElementById('bar-'+id);
  const status=document.getElementById('status-'+id);
  if(!prog)return;

  prog.style.display='block';status.style.display='block';
  status.style.color='#E65C00';status.textContent='Obtendo autorização...';
  let p=0;
  const iv=setInterval(()=>{if(p<85){p+=2;bar.style.width=p+'%';}},300);

  try{
    // 1. Busca token do YouTube
    const token=await getYtToken();
    if(!token) throw new Error('YouTube não autorizado. Fale com o pai.');

    status.textContent='Enviando para o YouTube...';
    const semLabel=getSemanaLabel();
    const titulo=`${currentPlayer.toUpperCase()} — ${nome} — ${semLabel}`;

    // 2. Upload para YouTube
    const videoId=await uploadYouTube(file,titulo,currentPlayer,token);

    status.textContent='Registrando...';

    // 3. Registra no Supabase
    const registro=await registrarSupabase(id,nome,currentPlayer,semLabel,videoId);
    const registroId=Array.isArray(registro)?registro[0]?.id:registro?.id;

    // 4. Análise IA (em paralelo — não bloqueia o fluxo)
    clearInterval(iv);bar.style.width='100%';
    estado[id+'-filmado']={nome,data:new Date().toISOString(),semana:semLabel,youtubeId:videoId};
    salvarEstado();
    status.textContent='✓ Enviado! Analisando com IA...';
    status.style.color='#4CAF50';

    const btn=document.getElementById('btn-'+id);
    if(btn){
      const existing=btn.parentElement.querySelector('span[data-filmado]');
      if(!existing){
        const s=document.createElement('span');s.setAttribute('data-filmado','1');
        s.style.cssText="font-family:'JetBrains Mono',monospace;font-size:9px;color:#4CAF50;letter-spacing:1px;";
        s.textContent='📹 enviado';btn.parentElement.appendChild(s);
      }
    }

    // Análise IA assíncrona
    if(registroId){
      try{
        const analise=await analisarComIA(registroId,id,nome,currentPlayer,videoId);
        await salvarAnaliseSupabase(registroId,analise);
        status.textContent=`✓ Análise pronta! ${analise.resumo_crianca}`;
        status.style.color='#4CAF50';

        // Mostra resumo na tela do garoto
        const card=document.getElementById('card-'+id);
        if(card){
          const resumoEl=card.querySelector('.ia-resumo');
          if(!resumoEl){
            const div=document.createElement('div');
            div.className='ia-resumo';
            div.style.cssText='padding:8px 16px;background:rgba(59,158,255,0.08);border-top:1px solid rgba(59,158,255,0.2);font-size:12px;color:#3b9eff;font-style:italic;';
            div.innerHTML=`🤖 ${analise.resumo_crianca} <span style="color:var(--text-dim);font-size:10px;">— IA</span>`;
            card.appendChild(div);
          }
        }
      }catch(iaErr){
        console.warn('Análise IA falhou:',iaErr);
        status.textContent='✓ Vídeo enviado! (Análise IA indisponível)';
      }
    }
  }catch(err){
    clearInterval(iv);
    bar.style.width='0%';
    status.textContent='❌ Erro: '+err.message;
    status.style.color='#f44336';
    // Não some — fica visível para diagnóstico
    return;
  }

  setTimeout(()=>{prog.style.display='none';status.textContent='';status.style.display='none';},6000);
}
