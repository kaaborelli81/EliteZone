<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Painel de Saúde — Lucas & Miguel</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#F2F0EB;
  --surface:#FFFFFF;
  --surface2:#F8F7F4;
  --surface3:#EEECEA;
  --border:#E0DDD8;
  --border2:#D0CCC6;
  --text:#1A1714;
  --text2:#5A544D;
  --text3:#9A9490;
  --lucas:#2563EB;
  --lucas-dim:rgba(37,99,235,0.08);
  --lucas-border:rgba(37,99,235,0.2);
  --miguel:#059669;
  --miguel-dim:rgba(5,150,105,0.08);
  --miguel-border:rgba(5,150,105,0.2);
  --ok:#16A34A;
  --ok-bg:#F0FDF4;
  --ok-border:#BBF7D0;
  --warn:#D97706;
  --warn-bg:#FFFBEB;
  --warn-border:#FDE68A;
  --alert:#DC2626;
  --alert-bg:#FEF2F2;
  --alert-border:#FECACA;
  --info:#2563EB;
  --info-bg:#EFF6FF;
  --info-border:#BFDBFE;
  --gold:#B45309;
  --gold-bg:#FFFBEB;
  --med:#7C3AED;
  --med-bg:rgba(124,58,237,0.06);
  --med-border:rgba(124,58,237,0.2);
  --radius:12px;
  --radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:400;min-height:100vh;overflow-x:hidden;}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(242,240,235,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;}
.back{background:var(--surface);border:1px solid var(--border2);color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.5px;padding:6px 12px;border-radius:6px;cursor:pointer;text-decoration:none;transition:all .15s;}
.back:hover{border-color:var(--text3);color:var(--text);}
.top-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);}
.top-badge{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);padding:3px 8px;border:1px solid var(--border);border-radius:4px;margin-left:auto;background:var(--surface);}

/* ACCESS TABS */
.access-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:0;position:sticky;top:56px;z-index:40;overflow-x:auto;}
.acc-tab{padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;}
.acc-tab.on{color:var(--lucas);border-bottom-color:var(--lucas);}
.acc-tab:hover:not(.on){color:var(--text2);}
.acc-tab.med-tab.on{color:var(--med);border-bottom-color:var(--med);}

/* ATHLETE SELECTOR */
.ath-sel{display:flex;gap:8px;padding:20px 20px 0;max-width:900px;margin:0 auto;}
.ath-btn{padding:8px 20px;border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;background:var(--surface2);color:var(--text3);transition:all .15s;}
.ath-btn.lucas.on{background:var(--lucas-dim);border-color:var(--lucas-border);color:var(--lucas);}
.ath-btn.miguel.on{background:var(--miguel-dim);border-color:var(--miguel-border);color:var(--miguel);}
.ath-btn:not(.on):hover{color:var(--text2);}

.wrap{padding:0 20px 60px;max-width:900px;margin:0 auto;}
.panel{display:none;}.panel.active{display:block;}

/* ATHLETE HEADER */
.ath-hd{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 var(--radius) var(--radius) var(--radius);padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.ath-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;flex-shrink:0;}
.lucas .ath-av{background:var(--lucas-dim);border:2px solid var(--lucas-border);color:var(--lucas);}
.miguel .ath-av{background:var(--miguel-dim);border:2px solid var(--miguel-border);color:var(--miguel);}
.ath-nm{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.lucas .ath-nm{color:var(--lucas);}
.miguel .ath-nm{color:var(--miguel);}
.ath-pos{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;margin-top:2px;letter-spacing:0.5px;}
.phv-badge{margin-left:auto;padding:10px 16px;border-radius:var(--radius-sm);font-family:'JetBrains Mono',monospace;font-size:9px;text-align:center;border:1px solid var(--border);}
.phv-badge .pbl{color:var(--text3);font-size:8px;margin-bottom:3px;letter-spacing:0.5px;}
.phv-badge .pbv{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;}
.phv-pre{background:var(--ok-bg);border-color:var(--ok-border)!important;}.phv-pre .pbv{color:var(--ok);}
.phv-circa{background:var(--warn-bg);border-color:var(--warn-border)!important;}.phv-circa .pbv{color:var(--warn);}
.phv-post{background:var(--alert-bg);border-color:var(--alert-border)!important;}.phv-post .pbv{color:var(--alert);}
.phv-unk{background:var(--surface2);}.phv-unk .pbv{color:var(--text3);font-size:11px;}

/* STATUS DOTS ROW — novo */
.status-row{display:flex;align-items:center;gap:6px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;flex-wrap:wrap;}
.status-row-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-right:4px;}
.sdot{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:default;transition:all .15s;}
.sdot:hover{filter:brightness(0.95);}
.sdot-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sdot-ok{background:var(--ok-bg);color:var(--ok);}
.sdot-ok .sdot-dot{background:var(--ok);}
.sdot-warn{background:var(--warn-bg);color:var(--warn);}
.sdot-warn .sdot-dot{background:var(--warn);}
.sdot-alert{background:var(--alert-bg);color:var(--alert);}
.sdot-alert .sdot-dot{background:var(--alert);}
.sdot-info{background:var(--info-bg);color:var(--info);}
.sdot-info .sdot-dot{background:var(--info);}
.sdot-neutral{background:var(--surface2);color:var(--text3);}
.sdot-neutral .sdot-dot{background:var(--text3);}

/* SEC WRAP */
.sec-wrap{display:none;}.sec-wrap.active{display:block;}

/* TILES */
.tiles4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:560px){.tiles4{grid-template-columns:repeat(2,1fr);}}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center;}
.tv{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1;}
.tu{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;color:var(--text3);margin-left:2px;}
.tl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);margin-top:5px;}
.td2{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;margin-top:2px;}
.td-ok{color:var(--ok);}
.td-warn{color:var(--warn);}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;}
.ct{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}

/* CHART */
.chart-wrap{position:relative;width:100%;height:200px;}

/* FORM */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
@media(max-width:540px){.g2,.g3{grid-template-columns:1fr;}}
.f{display:flex;flex-direction:column;gap:5px;}
.f label{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text2);}
.f input,.f select,.f textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;transition:border-color .15s;width:100%;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--lucas);box-shadow:0 0 0 3px var(--lucas-dim);}
.f input::placeholder,.f textarea::placeholder{color:var(--text3);}
.f textarea{resize:vertical;min-height:50px;}
.f select option{background:var(--surface);}
.sbtn{width:100%;background:var(--lucas);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.3px;padding:10px;border:none;border-radius:var(--radius-sm);cursor:pointer;margin-top:4px;transition:all .15s;}
.sbtn:hover{opacity:.9;}
.sbtn.mig{background:var(--miguel);}

/* TABLE */
.ht{width:100%;border-collapse:collapse;font-size:12px;}
.ht th{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text3);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
.ht td{padding:10px 10px;border-bottom:1px solid var(--border);color:var(--text2);}
.ht tr:last-child td{border-bottom:none;}
.ht tr:hover td{background:var(--surface2);}
.ht td.vl{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text);}
.ht td.dp{font-size:11px;font-weight:500;color:var(--ok);}
.ht td.dn{font-size:11px;font-weight:500;color:var(--alert);}
.ht td.dz{font-size:11px;color:var(--text3);}
.del{background:none;border:1px solid var(--alert-border);color:var(--alert);font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;transition:all .15s;}
.del:hover{background:var(--alert-bg);}

/* ── BLOOD EXAM CARDS — novo design com barra ── */
.exam-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px;}
@media(max-width:540px){.exam-grid{grid-template-columns:1fr;}}
.exam-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:box-shadow .15s;}
.exam-tile:hover{box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.exam-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.exam-name{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.exam-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.exam-val-row{display:flex;align-items:baseline;gap:4px;margin-bottom:6px;}
.exam-val{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;line-height:1;}
.exam-unit{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text3);}
.exam-bar-wrap{height:4px;background:var(--surface3);border-radius:2px;margin-bottom:8px;overflow:hidden;}
.exam-bar{height:100%;border-radius:2px;transition:width .4s ease;}
.exam-status{font-size:12px;font-weight:500;margin-bottom:4px;}
.exam-note{font-size:11px;color:var(--text3);line-height:1.4;}
.exam-trend{font-size:11px;color:var(--text3);margin-top:4px;font-family:'JetBrains Mono',monospace;}
/* status colors */
.exam-ok .exam-dot{background:var(--ok);}
.exam-ok .exam-val{color:var(--ok);}
.exam-ok .exam-bar{background:var(--ok);}
.exam-ok .exam-status{color:var(--ok);}
.exam-ok{border-color:var(--ok-border);}
.exam-warn .exam-dot{background:var(--warn);}
.exam-warn .exam-val{color:var(--warn);}
.exam-warn .exam-bar{background:var(--warn);}
.exam-warn .exam-status{color:var(--warn);}
.exam-warn{border-color:var(--warn-border);}
.exam-alert .exam-dot{background:var(--alert);}
.exam-alert .exam-val{color:var(--alert);}
.exam-alert .exam-bar{background:var(--alert);}
.exam-alert .exam-status{color:var(--alert);}
.exam-alert{border-color:var(--alert-border);}
.exam-info .exam-dot{background:var(--info);}
.exam-info .exam-val{color:var(--info);}
.exam-info .exam-bar{background:var(--info);}
.exam-info .exam-status{color:var(--info);}
.exam-info{border-color:var(--info-border);}

/* SLEEP */
.sleep-week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px;}
.sleep-day{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 4px;text-align:center;}
.sleep-day .sd-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text3);margin-bottom:4px;}
.sleep-day .sd-val{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;}
.sleep-day.ok{background:var(--ok-bg);border-color:var(--ok-border);}.sleep-day.ok .sd-val{color:var(--ok);}
.sleep-day.warn{background:var(--warn-bg);border-color:var(--warn-border);}.sleep-day.warn .sd-val{color:var(--warn);}
.sleep-day.bad{background:var(--alert-bg);border-color:var(--alert-border);}.sleep-day.bad .sd-val{color:var(--alert);}
.sleep-day.empty .sd-val{color:var(--text3);}

/* ALERT BANNER */
.alert-banner{padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:14px;font-size:13px;line-height:1.5;}
.al-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.5px;text-transform:uppercase;opacity:.8;margin-bottom:4px;}
.aw{background:var(--warn-bg);border:1px solid var(--warn-border);color:var(--warn);}
.ao{background:var(--ok-bg);border:1px solid var(--ok-border);color:var(--ok);}

/* PARENTS */
.p-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:440px){.p-row{grid-template-columns:1fr;}}
.p-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;}
.p-lbl{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text3);margin-bottom:4px;}
.p-val{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:var(--text);}

/* MED NOTE */
.note-list{display:flex;flex-direction:column;gap:8px;}
.note-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
.note-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-bottom:4px;}
.note-type{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:6px;}
.nt-consulta{background:var(--med-bg);color:var(--med);border:1px solid var(--med-border);}
.nt-exame{background:var(--info-bg);color:var(--info);border:1px solid var(--info-border);}
.nt-fisio{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border);}
.nt-obs{background:var(--surface3);color:var(--text2);border:1px solid var(--border);}
.note-text{font-size:13px;color:var(--text2);line-height:1.5;}
.sec-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin:18px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* PHV PHASES */
.phv-phases{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:540px){.phv-phases{grid-template-columns:1fr;}}
.ph{padding:12px 14px;border-radius:var(--radius-sm);}
.ph-nm{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;margin-bottom:4px;}
.ph-txt{font-size:12px;color:var(--text2);line-height:1.5;}
.ph-pre{background:var(--ok-bg);border:1px solid var(--ok-border);}.ph-pre .ph-nm{color:var(--ok);}
.ph-circ{background:var(--warn-bg);border:1px solid var(--warn-border);}.ph-circ .ph-nm{color:var(--warn);}
.ph-post{background:var(--alert-bg);border:1px solid var(--alert-border);}.ph-post .ph-nm{color:var(--alert);}

.empty-st{text-align:center;padding:28px;color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px;}
</style>
</head>
<body>

<div class="topbar">
  <a href="painel_motor.html" class="back">← Painel</a>
  <span class="top-title">Saúde</span>
  <span class="top-badge" id="top-badge">// painel clínico</span>
</div>

<div class="access-bar">
  <button class="acc-tab on" onclick="setSection('crescimento')">Crescimento</button>
  <button class="acc-tab" onclick="setSection('exames')">Exames</button>
  <button class="acc-tab" onclick="setSection('sono')">Sono</button>
  <button class="acc-tab med-tab" onclick="setSection('medico')">Médico</button>
</div>

<div class="ath-sel" id="ath-sel"></div>
<div class="wrap">
  <div id="panels"></div>
</div>

<script>
const KEY='biometria_v2';
function load(){try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):null;}catch(e){return null;}}
function save(s){localStorage.setItem(KEY,JSON.stringify(s));}
function defaults(){
  return{athletes:[
    {id:'lucas',name:'Lucas',dob:'2012-05-12',position:'Meio / Ponta esquerda · Fut7 & Futsal',color:'lucas',fatherHeight:null,motherHeight:null,records:[],exames:[],sono:[],notas:[]},
    {id:'miguel',name:'Miguel',dob:'2013-09-13',position:'Goleiro · Fut7 & Futsal',color:'miguel',fatherHeight:null,motherHeight:null,records:[],exames:[],sono:[],notas:[]}
  ],activeId:'lucas',section:'crescimento'};
}

let state=load()||defaults();
state.athletes.forEach(a=>{
  if(!a.exames)a.exames=[];
  if(!a.sono)a.sono=[];
  if(!a.notas)a.notas=[];
});

function phvOffset(h,w,dob){
  if(!h||!w||!dob)return null;
  const age=(new Date()-new Date(dob))/(365.25*24*3600*1000);
  if(age<8)return null;
  return parseFloat((-9.236+(0.0002708*(h*w))+(-0.001663*(age*h))+(0.007216*(age*w))+(0.02292*(w/h*100))).toFixed(2));
}
function phvPhase(o){if(o===null)return'unk';if(o<-1)return'pre';if(o<=1)return'circa';return'post';}
function targetH(f,m){return f&&m?((parseFloat(f)+parseFloat(m)+13)/2).toFixed(1):null;}
function ageYrs(dob){return((new Date()-new Date(dob))/(365.25*24*3600*1000)).toFixed(1);}
function fmtD(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'});}

// ── REFERÊNCIAS DE PERFORMANCE ATLÉTICA (não de laboratório clínico)
const EXAM_REFS={
  'Ferritina':     {unit:'ng/mL', low:30,  high:120, opt:[50,100],  perf_min:50,  note:'Deficiência atlética <50. Lab diz "normal" acima de 12.', trend_key:'ferritina'},
  'Vitamina D':    {unit:'ng/mL', low:30,  high:100, opt:[50,80],   perf_min:50,  note:'Zona atlética: 50–80. Lab aceita >20.', trend_key:'vitamina_d'},
  'Ferro':         {unit:'µg/dL', low:65,  high:175, opt:[80,150],  perf_min:80,  note:'Queda progressiva compromete VO2max e sprint.', trend_key:'ferro'},
  'Hemoglobina':   {unit:'g/dL',  low:12.5,high:16,  opt:[13.5,15.5],perf_min:13.5,note:'Transporte de oxigênio ao músculo.', trend_key:'hemoglobina'},
  'Hematócrito':   {unit:'%',     low:38,  high:50,  opt:[40,46],   perf_min:40,  note:'', trend_key:'hematocrito'},
  'Vitamina B6':   {unit:'µg/L',  low:20,  high:200, opt:[40,100],  perf_min:40,  note:'Elevado pós-exercício é fisiológico (liberação muscular).', trend_key:'b6'},
  'Vitamina B12':  {unit:'pg/mL', low:300, high:950, opt:[400,800], perf_min:400, note:'Síntese de hemácias e função neurológica.', trend_key:'b12'},
  'Vitamina C':    {unit:'mg/dL', low:0.4, high:2.1, opt:[0.8,2.0], perf_min:0.8, note:'Antioxidante. Síntese de colágeno em tendões.', trend_key:'vitc'},

// Importância para alertas visuais
const EXAM_PRIORITY={
  'Ferritina':'critical','Ferro':'critical','Vitamina D':'high','TSH':'high',
  'Vitamina B6':'info','Hemoglobina':'high','Magnésio':'medium','Vitamina C':'medium',
  'Testosterona':'info','PCR':'info','IGF-1':'critical'
};

function examStatus(name,val){
  const r=EXAM_REFS[name];
  if(!r||r.opt===null||val===null||val===undefined)return'exam-info';
  // Para PCR, menor é melhor
  if(name==='PCR'){
    if(val<=r.opt[1])return'exam-ok';
    if(val<=r.high)return'exam-warn';
    return'exam-alert';
  }
  if(val<r.low)return'exam-alert';
  if(val>r.high&&name!=='Vitamina B6')return'exam-warn';
  if(name==='Vitamina B6')return'exam-info'; // elevado pós-exercício é fisiológico
  if(r.perf_min&&val<r.perf_min)return'exam-warn'; // abaixo do mínimo atlético
  if(val>=r.opt[0]&&val<=r.opt[1])return'exam-ok';
  return'exam-warn';
}

function examBarPct(name,val){
  const r=EXAM_REFS[name];
  if(!r||!r.opt||val===null)return 0;
  if(name==='PCR')return Math.max(0,Math.min(100,100-(val/r.high*100)));
  const max=r.high||r.opt[1]*1.2;
  return Math.max(4,Math.min(100,Math.round(val/max*100)));
}

function examStatusLabel(name,val,cls){
  const r=EXAM_REFS[name];
  if(!r||r.opt===null)return cls==='exam-info'?'ℹ Contexto esportivo':'—';
  if(name==='Vitamina B6'&&cls==='exam-info')return'ℹ Elevado — contexto esportivo';
  if(cls==='exam-ok')return'✓ Zona de performance';
  if(cls==='exam-warn'){
    if(r.perf_min&&val<r.perf_min)return'⚠ Abaixo do mínimo atlético';
    return'⚠ Atenção';
  }
  if(cls==='exam-alert')return'⚠ Deficiência atlética';
  return'—';
}

const charts={};

function setAthlete(id){state.activeId=id;save(state);renderAll();}
function setSection(s){state.section=s;save(state);
  document.querySelectorAll('.acc-tab').forEach((t,i)=>{
    const sections=['crescimento','exames','sono','medico'];
    t.classList.toggle('on',sections[i]===s);
  });
  document.querySelectorAll('.sec-wrap').forEach(w=>w.classList.remove('active'));
  document.querySelectorAll('.sec-wrap.sec-'+s).forEach(w=>w.classList.add('active'));
}

function renderAll(){
  renderAthleteSelector();
  renderPanels();
  renderCharts();
  document.getElementById('top-badge').textContent='// '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function renderAthleteSelector(){
  const el=document.getElementById('ath-sel');
  el.innerHTML=state.athletes.map(a=>`
    <button class="ath-btn ${a.color} ${a.id===state.activeId?'on':''}" onclick="setAthlete('${a.id}')">${a.name}</button>
  `).join('');
}

function renderPanels(){
  const container=document.getElementById('panels');
  container.innerHTML=state.athletes.map(a=>renderPanel(a)).join('');
  document.querySelectorAll('.sec-wrap').forEach(w=>w.classList.remove('active'));
  document.querySelectorAll('.sec-wrap.sec-'+state.section).forEach(w=>{
    if(w.closest('[data-id="'+state.activeId+'"]'))w.classList.add('active');
  });
}

          <thead><tr><th>Data</th><th>Horas</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${(a.sono||[]).length===0?`<tr><td colspan="4"><div class="empty-st">Sem registros de sono.</div></td></tr>`:
            [...(a.sono||[])].sort((x,y)=>new Date(y.date)-new Date(x.date)).slice(0,30).map(s=>{
              const st=s.hours>=9?'ok':s.hours>=6?'warn':'bad';
              const stLbl={ok:'Adequado',warn:'Atenção',bad:'Insuficiente'};
              const stC={ok:'var(--ok)',warn:'var(--warn)',bad:'var(--alert)'};
              return`<tr>
                <td>${fmtD(s.date)}</td>
                <td class="vl">${s.hours}<span style="font-size:10px;color:var(--text3)">h</span></td>
                <td style="font-size:12px;font-weight:500;color:${stC[st]}">${stLbl[st]}</td>
                <td><button class="del" onclick="delSono('${a.id}','${s.date}')">×</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── MÉDICO ── -->
    <div class="sec-wrap sec-medico">
      <div class="card">
        <div class="ct">Anotações médicas e consultas</div>
        <div class="note-list">${noteItems}</div>
      </div>

      <div class="sec-title">Nova anotação</div>
      <div class="card">
        <div class="g2">
          <div class="f"><label>Data</label><input type="date" id="nd-${a.id}" value="${new Date().toISOString().split('T')[0]}"></div>
          <div class="f"><label>Tipo</label>
            <select id="nt-${a.id}">
              <option value="consulta">Consulta</option>
              <option value="exame">Exame</option>
              <option value="fisio">Fisioterapia</option>
              <option value="obs">Observação</option>
            </select>
          </div>
        </div>
        <div class="f" style="margin-bottom:10px;"><label>Anotação</label>
          <textarea id="ntxt-${a.id}" placeholder="Ex: Endocrinologista — ferritina 25,3 ng/mL, prescreveu ferro bisglicinato 25mg dias alternados + vitamina D3 4.000 UI..."></textarea>
        </div>
        <button class="sbtn ${a.color==='miguel'?'mig':''}" onclick="addNota('${a.id}')">Salvar anotação</button>
      </div>

      <div style="padding:16px;background:var(--med-bg);border:1px solid var(--med-border);border-radius:var(--radius);margin-top:16px;">
        <div style="font-size:12px;font-weight:600;color:var(--med);margin-bottom:8px;">Compartilhar com médico</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;">
          Para compartilhar este painel com o pediatra ou nutricionista, exporte como PDF ou use o painel médico compartilhável (medico.html) disponível na aba Nutrição do Motor de Diagnóstico.
        </div>
        <button class="sbtn" style="background:var(--med-bg);color:var(--med);border:1px solid var(--med-border);" onclick="window.print()">Exportar PDF para médico</button>
      </div>
    </div>

  </div>`;
}

// ── CHARTS
function renderCharts(){
  state.athletes.forEach(a=>{
    const canvas=document.getElementById('chart-'+a.id);
    if(!canvas)return;
    if(charts[a.id]){charts[a.id].destroy();}
    const recs=[...a.records].sort((x,y)=>new Date(x.date)-new Date(y.date));
    if(!recs.length){
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#9A9490';ctx.font='12px DM Sans';
      ctx.textAlign='center';ctx.fillText('Sem dados ainda',canvas.offsetWidth/2||160,100);
      return;
    }
    const cMap={lucas:'#2563EB',miguel:'#059669'};
    const c=cMap[a.color]||'#2563EB';
    charts[a.id]=new Chart(canvas,{
      type:'line',
      data:{
        labels:recs.map(r=>fmtD(r.date)),
        datasets:[
          {label:'Altura (cm)',data:recs.map(r=>r.height),borderColor:c,backgroundColor:c+'18',borderWidth:2,pointBackgroundColor:c,pointRadius:4,tension:0.35,yAxisID:'y'},
          {label:'Peso (kg)',data:recs.map(r=>r.weight),borderColor:'#D97706',backgroundColor:'#D9770618',borderWidth:1.5,pointBackgroundColor:'#D97706',pointRadius:3,tension:0.35,borderDash:[4,3],yAxisID:'y2'}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{ticks:{color:'#9A9490',font:{size:10,family:'DM Sans'}},grid:{color:'rgba(0,0,0,0.04)'}},
          y:{position:'left',ticks:{color:c,font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
          y2:{position:'right',ticks:{color:'#D97706',font:{size:10}},grid:{drawOnChartArea:false}}
        }
      }
    });
  });
}

// ── ACTIONS
function savePar(id){
  const a=state.athletes.find(x=>x.id===id);if(!a)return;
  const f=parseFloat(document.getElementById('fi-'+id).value);
  const m=parseFloat(document.getElementById('mi-'+id).value);
  if(!isNaN(f))a.fatherHeight=f;if(!isNaN(m))a.motherHeight=m;
  save(state);renderAll();
}
function updateExamUnit(id){
  const name=document.getElementById('en-'+id).value;
  const ref=EXAM_REFS[name];
  document.getElementById('eu-'+id).value=ref?.unit||'';
}
function addMed(id){
  const a=state.athletes.find(x=>x.id===id);if(!a)return;
  const date=document.getElementById('md-'+id).value;
  const height=parseFloat(document.getElementById('mh-'+id).value);
  const weight=parseFloat(document.getElementById('mw-'+id).value);
  const obs=document.getElementById('mo-'+id).value.trim();
  if(!date||isNaN(height)||isNaN(weight)){alert('Preencha data, altura e peso.');return;}
  a.records=a.records.filter(r=>r.date!==date);
  a.records.push({date,height,weight,obs});
  save(state);
  document.getElementById('mh-'+id).value='';
  document.getElementById('mw-'+id).value='';
  document.getElementById('mo-'+id).value='';
  renderAll();
}
function delMed(id,date){
  const a=state.athletes.find(x=>x.id===id);if(!a)return;
  if(!confirm('Remover medição?'))return;
  a.records=a.records.filter(r=>r.date!==date);
  save(state);renderAll();
}
function addExame(id){
  const a=state.athletes.find(x=>x.id===id);if(!a)return;
  const date=document.getElementById('ed-'+id).value;
  const name=document.getElementById('en-'+id).value;
  const value=parseFloat(document.getElementById('ev-'+id).value);
  const unit=document.getElementById('eu-'+id).value.trim();
  const obs=document.getElementById('eo-'+id).value.trim();
  if(!date||!name||isNaN(value)){alert('Preencha data, nome e valor.');return;}
  if(!a.exames)a.exames=[];
  a.exames.push({id:Date.now().toString(),date,name,value,unit,obs});
  save(state);
  document.getElementById('ev-'+id).value='';document.getElementById('eo-'+id).value='';
  renderAll();
}
function delExame(id,eid){
  const a=state.athletes.find(x=>x.id===id);if(!a)return;
  if(!confirm('Remover exame?'))return;
  a.exames=a.exames.filter(e=>e.id!==eid);
  save(state);renderAll();
}
function addSono(id){
  const a=state.athletes.find(x=>x.id===id);if(!a)return;
  const date=document.getElementById('sd-'+id).value;
  const hours=parseFloat(document.getElementById('sh-'+id).value);
  if(!date||isNaN(hours)){alert('Preencha data e horas.');return;}
  if(!a.sono)a.sono=[];
  a.sono=a.sono.filter(s=>s.date!==date);
  a.sono.push({date,hours});
  save(state);
  document.getElementById('sh-'+id).value='';
  renderAll();
}
function delSono(id,date){
  const a=state.athletes.find(x=>x.id===id);if(!a)return;
  if(!confirm('Remover registro?'))return;
  a.sono=a.sono.filter(s=>s.date!==date);
  save(state);renderAll();
}
function addNota(id){
  const a=state.athletes.find(x=>x.id===id);if(!a)return;
  const date=document.getElementById('nd-'+id).value;
  const type=document.getElementById('nt-'+id).value;
  const text=document.getElementById('ntxt-'+id).value.trim();
  if(!date||!text){alert('Preencha data e anotação.');return;}
  if(!a.notas)a.notas=[];
  a.notas.push({id:Date.now().toString(),date,type,text});
  save(state);
  document.getElementById('ntxt-'+id).value='';
  renderAll();
}

// ── INIT
renderAll();
setSection(state.section||'crescimento');
</script>
</body>
</html>
