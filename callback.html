<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autorizando YouTube...</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:#0a0a0a;
      color:#e0e0e0;
      font-family:'JetBrains Mono',monospace;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:24px;
    }
    .card{
      background:#111;
      border:1px solid #222;
      border-radius:6px;
      padding:40px;
      max-width:480px;
      width:100%;
      text-align:center;
    }
    .logo{
      font-family:'Rajdhani',sans-serif;
      font-size:22px;
      font-weight:700;
      letter-spacing:3px;
      text-transform:uppercase;
      color:#fff;
      margin-bottom:32px;
    }
    .logo span{color:#3b9eff;}
    .status{
      font-size:11px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:#888;
      margin-bottom:16px;
    }
    .msg{
      font-size:13px;
      color:#e0e0e0;
      line-height:1.6;
      margin-bottom:24px;
    }
    .ok{color:#4CAF50;}
    .err{color:#f44336;}
    .spinner{
      width:32px;height:32px;
      border:2px solid #222;
      border-top-color:#3b9eff;
      border-radius:50%;
      animation:spin .8s linear infinite;
      margin:0 auto 24px;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .btn{
      display:inline-block;
      margin-top:16px;
      padding:10px 24px;
      background:rgba(59,158,255,0.1);
      border:1px solid rgba(59,158,255,0.3);
      border-radius:3px;
      color:#3b9eff;
      font-family:'JetBrains Mono',monospace;
      font-size:10px;
      letter-spacing:2px;
      text-transform:uppercase;
      text-decoration:none;
      cursor:pointer;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">ATLETA <span>ELITE</span></div>
  <div id="spinner" class="spinner"></div>
  <div class="status" id="status">processando autorização</div>
  <div class="msg" id="msg">Aguarde enquanto salvamos o token do YouTube...</div>
  <div id="action"></div>
</div>

<script>
const SUPABASE_URL = 'https://dxqsjkvpzdvzyqfwcpro.supabase.co';
const SUPABASE_KEY = 'sb_publishable_hLGKARCdEPRZfEWaNhg71A_-8LKa3tO';
const CLIENT_ID    = '184444339048-1fkagpi8hbmavlaqoqf2oht2sk3fqvno.apps.googleusercontent.com';
const CLIENT_SECRET= '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';
const REDIRECT_URI = 'https://elite-zone.vercel.app/callback.html';

async function sbFetch(path, opts={}) {
  return fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      ...(opts.headers||{})
    }
  });
}

function setStatus(status, msg, isError=false) {
  document.getElementById('spinner').style.display = isError ? 'none' : 'block';
  document.getElementById('status').textContent = status;
  document.getElementById('msg').textContent = msg;
  document.getElementById('msg').className = 'msg' + (isError ? ' err' : '');
}

function setOk(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('status').textContent = 'autorizado com sucesso';
  document.getElementById('msg').innerHTML = '<span class="ok">✓</span> ' + msg;
  document.getElementById('action').innerHTML =
    '<a class="btn" href="agente_video.html">← voltar ao painel</a>';
}

function setError(msg) {
  setStatus('erro na autorização', msg, true);
  document.getElementById('action').innerHTML =
    '<a class="btn" href="agente_video.html">← tentar novamente</a>';
}

async function main() {
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const error = params.get('error');

  if (error) {
    setError('Autorização negada: ' + error);
    return;
  }
  if (!code) {
    setError('Código de autorização não encontrado na URL.');
    return;
  }

  // 1. Troca o code por access_token + refresh_token
  setStatus('trocando código por token', 'Comunicando com o Google...');
  let tokenData;
  try {
    const resp = await fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        code,
        client_id:     CLIENT_ID,
        client_secret: CLIENT_SECRET,
        redirect_uri:  REDIRECT_URI,
        grant_type:    'authorization_code'
      })
    });
    tokenData = await resp.json();
    if (!tokenData.access_token) throw new Error(tokenData.error_description || JSON.stringify(tokenData));
  } catch(e) {
    setError('Erro ao obter token: ' + e.message);
    return;
  }

  // 2. Apaga tokens antigos e salva o novo no Supabase
  setStatus('salvando token', 'Registrando autorização no banco...');
  try {
    // Apaga registros antigos
    await sbFetch('/rest/v1/youtube_tokens?id=neq.0', { method: 'DELETE' });

    // Insere novo
    const payload = {
      jogador:       'pai',
      access_token:  tokenData.access_token,
      refresh_token: tokenData.refresh_token || null,
      atualizado_em: new Date().toISOString()
    };
    const r = await sbFetch('/rest/v1/youtube_tokens', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify(payload)
    });
    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.message || JSON.stringify(err));
    }
  } catch(e) {
    setError('Erro ao salvar token: ' + e.message);
    return;
  }

  setOk('YouTube autorizado. Lucas e Miguel já podem usar o botão FILMAR.');
}

main();
</script>
</body>
</html>
